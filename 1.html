<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即时通讯</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #2d2d2d; padding: 15px; text-align: center; border-bottom: 2px solid #4CAF50; }
        .header h1 { color: #4CAF50; font-size: 1.5rem; }
        .status-bar { background: #252525; padding: 10px; text-align: center; font-size: 0.85rem; }
        .status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-waiting { background: #ffc107; }
        .status-connected { background: #4caf50; }
        .status-disconnected { background: #f44336; }
        .container { flex: 1; max-width: 600px; margin: 0 auto; width: 100%; padding: 20px; }
        .welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .btn { background: #4CAF50; color: #fff; border: none; padding: 15px 40px; font-size: 1rem; cursor: pointer; border-radius: 5px; transition: all 0.3s; }
        .btn:hover { background: #45a049; }
        .btn-secondary { background: #3d3d3d; }
        .btn-secondary:hover { background: #4d4d4d; }
        .btn-file { background: #2196F3; color: #fff; border: none; padding: 8px 16px; font-size: 0.9rem; cursor: pointer; border-radius: 20px; }
        .btn-file:hover { background: #1976D2; }
        .btn-download { background: #ff9800; color: #fff; border: none; padding: 8px 16px; font-size: 0.9rem; cursor: pointer; border-radius: 5px; }
        .btn-download:hover { background: #f57c00; }
        .btn-download:disabled { background: #666; cursor: not-allowed; }
        .input-code { padding: 12px 15px; font-size: 1rem; border: 2px solid #3d3d3d; border-radius: 5px; background: #252525; color: #fff; text-align: center; }
        .invite-code-display { font-size: 2rem; font-weight: bold; color: #4CAF50; letter-spacing: 5px; }
        .chat-screen { display: none; flex-direction: column; height: 100%; }
        .chat-screen.active { display: flex; }
        .chat-header { display: flex; justify-content: space-between; padding: 10px; background: #2d2d2d; margin-bottom: 10px; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 70%; word-break: break-word; }
        .message.sent { background: #4CAF50; color: #fff; align-self: flex-end; }
        .message.received { background: #2196F3; color: #fff; align-self: flex-start; }
        .message.file-message { background: #333; padding: 15px; max-width: 80%; }
        .message-time { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; }
        .input-area { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .message-input { flex: 1; padding: 12px; border: 2px solid #3d3d3d; border-radius: 20px; background: #252525; color: #fff; resize: none; }
        .send-btn { padding: 12px 24px; background: #4CAF50; color: #fff; border: none; border-radius: 20px; cursor: pointer; }
        .hint { text-align: center; color: #888; font-size: 0.85rem; margin-top: 15px; }
        .disconnected-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; }
        .disconnected-overlay.active { display: flex; }
        .disconnected-overlay h2 { color: #f44336; font-size: 1.5rem; margin-bottom: 10px; }
        .disconnected-overlay p { color: #888; margin-bottom: 20px; }
        
        /* 文件消息样式 */
        .file-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .file-icon { font-size: 2rem; }
        .file-details { flex: 1; }
        .file-name { font-weight: bold; margin-bottom: 3px; }
        .file-size { font-size: 0.8rem; opacity: 0.8; }
        .file-timer { font-size: 0.85rem; color: #ffc107; margin: 8px 0; }
        .file-status { font-size: 0.8rem; margin-top: 5px; }
        .file-status.expired { color: #f44336; }
        .file-status.downloaded { color: #4caf50; }
        
        /* 文件预览区 */
        .file-preview { display: none; background: #2d2d2d; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .file-preview.active { display: flex; align-items: center; gap: 10px; }
        .file-preview-name { flex: 1; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-preview-remove { background: #f44336; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 即时通讯</h1>
    </div>
    <div class="status-bar">
        <span class="status-indicator status-disconnected" id="statusIndicator"></span>
        <span id="statusText">未连接</span>
    </div>
    <div class="container">
        <div class="welcome-screen" id="welcomeScreen">
            <div id="nameSection">
                <p style="margin-bottom:10px;">设置你的昵称：</p>
                <input type="text" class="input-code" id="nameInput" maxlength="10" placeholder="请输入昵称" style="width:200px;">
                <p style="margin-top:20px;margin-bottom:10px;">设置消息焚毁时间（秒）：</p>
                <input type="number" class="input-code" id="burnTimeInput" value="8" min="3" max="60" style="width:100px;">
                <div style="margin-top:20px;display:flex;gap:10px;">
                    <button class="btn" id="createBtn">创建房间</button>
                    <button class="btn btn-secondary" id="joinBtn">输入邀请码</button>
                </div>
            </div>
            <div id="inviteSection" style="display:none;">
                <p>分享此邀请码：</p>
                <div style="display:flex;align-items:center;gap:10px;margin:20px 0;">
                    <div class="invite-code-display" id="inviteCode">------</div>
                    <button class="btn btn-secondary" id="copyBtn" style="padding:8px 15px;">复制</button>
                </div>
                <p>等待对方加入...</p>
            </div>
            <div id="joinSection" style="display:none;">
                <p>输入邀请码：</p>
                <div style="display:flex;gap:10px;margin:20px 0;">
                    <input type="text" class="input-code" id="codeInput" maxlength="6" placeholder="______" style="width:150px;">
                    <button class="btn" id="joinRoomBtn">加入</button>
                </div>
                <button class="btn btn-secondary" id="backBtn">返回</button>
            </div>
        </div>
        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <span>房间：<span id="roomCodeDisplay">------</span></span>
                <span>我：<span id="userNameDisplay">匿名</span></span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="file-preview" id="filePreview">
                <span class="file-preview-name" id="filePreviewName"></span>
                <button class="file-preview-remove" id="filePreviewRemove">×</button>
            </div>
            <div class="input-area">
                <input type="file" id="fileInput" style="display:none;" multiple>
                <button class="btn-file" id="fileBtn">📎</button>
                <textarea class="message-input" id="messageInput" rows="1" placeholder="输入消息..."></textarea>
                <button class="send-btn" id="sendBtn">发送</button>
            </div>
            <p class="hint">消息将在 <span id="displayBurnTime">8</span> 秒后自动焚毁</p>
        </div>
    </div>
    <div class="disconnected-overlay" id="disconnectedOverlay">
        <h2>连接已断开</h2>
        <p>对方已离开或网络中断</p>
        <button class="btn" id="reloadBtn">重新开始</button>
    </div>

    <script>
        let peer = null;
        let conn = null;
        let isHost = false;
        let currentInviteCode = null;
        let userName = '匿名';
        let burnTime = 8;
        let fileDownloadExpiry = 60; // 文件下载有效期（秒）
        let pendingFile = null; // 待发送的文件

        function generateCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        function updateStatus(status, text) {
            document.getElementById('statusIndicator').className = 'status-indicator status-' + status;
            document.getElementById('statusText').textContent = text;
        }

        function showNameSection() {
            document.getElementById('nameSection').style.display = 'block';
            document.getElementById('inviteSection').style.display = 'none';
            document.getElementById('joinSection').style.display = 'none';
        }

        function showInviteSection() {
            document.getElementById('nameSection').style.display = 'none';
            document.getElementById('inviteSection').style.display = 'block';
            document.getElementById('joinSection').style.display = 'none';
        }

        function showJoinSection() {
            document.getElementById('nameSection').style.display = 'none';
            document.getElementById('inviteSection').style.display = 'none';
            document.getElementById('joinSection').style.display = 'block';
            document.getElementById('codeInput').focus();
        }

        function copyInviteCode() {
            const code = document.getElementById('inviteCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('邀请码已复制！');
            }).catch(() => {
                const t = document.createElement('textarea');
                t.value = code;
                document.body.appendChild(t);
                t.select();
                document.execCommand('copy');
                document.body.removeChild(t);
                alert('邀请码已复制！');
            });
        }

        function createRoom() {
            userName = document.getElementById('nameInput').value.trim() || '匿名';
            burnTime = parseInt(document.getElementById('burnTimeInput').value) || 8;
            if (burnTime < 3) burnTime = 3;
            if (burnTime > 60) burnTime = 60;
            document.getElementById('displayBurnTime').textContent = burnTime;
            document.getElementById('userNameDisplay').textContent = userName;

            currentInviteCode = generateCode();
            document.getElementById('inviteCode').textContent = currentInviteCode;
            document.getElementById('roomCodeDisplay').textContent = currentInviteCode;

            showInviteSection();
            updateStatus('waiting', '等待连接...');

            peer = new Peer('burnafter-' + currentInviteCode, { debug: 0 });

            peer.on('connection', function(c) {
                conn = c;
                isHost = true;
                setupConnection();
            });

            peer.on('error', function(err) {
                alert('连接错误: ' + err.message);
                updateStatus('disconnected', '连接失败');
            });
        }

        function joinRoom() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            if (!code || code.length !== 6) {
                alert('请输入有效的6位邀请码');
                return;
            }

            userName = document.getElementById('nameInput').value.trim() || '匿名';
            burnTime = parseInt(document.getElementById('burnTimeInput').value) || 8;
            if (burnTime < 3) burnTime = 3;
            if (burnTime > 60) burnTime = 60;
            document.getElementById('displayBurnTime').textContent = burnTime;
            document.getElementById('userNameDisplay').textContent = userName;
            currentInviteCode = code;
            document.getElementById('roomCodeDisplay').textContent = code;

            updateStatus('waiting', '正在连接...');

            peer = new Peer({ debug: 0 });

            peer.on('open', function(id) {
                conn = peer.connect('burnafter-' + code);

                conn.on('open', function() {
                    isHost = false;
                    setupConnection();
                });

                conn.on('error', function(err) {
                    alert('连接失败: ' + err.message);
                    updateStatus('disconnected', '连接失败');
                });
            });

            peer.on('error', function(err) {
                alert('Peer错误: ' + err.message);
                updateStatus('disconnected', '连接失败');
            });
        }

        function setupConnection() {
            updateStatus('connected', '已连接');

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatScreen').classList.add('active');

            conn.on('data', function(data) {
                if (typeof data === 'object') {
                    if (data.type === 'message') {
                        showMessage(data.content, data.name, data.id, false);
                    } else if (data.type === 'file') {
                        receiveFile(data);
                    } else if (data.type === 'burn') {
                        burnMessage(data.id);
                    }
                }
            });

            conn.on('close', function() {
                document.getElementById('disconnectedOverlay').classList.add('active');
                updateStatus('disconnected', '连接已断开');
            });
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        // 获取文件图标
        function getFileIcon(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📄', 'doc': '📝', 'docx': '📝', 'txt': '📃',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'bmp': '🖼️',
                'mp4': '🎬', 'avi': '🎬', 'mov': '🎬', 'mkv': '🎬',
                'mp3': '🎵', 'wav': '🎵', 'flac': '🎵',
                'zip': '📦', 'rar': '📦', '7z': '📦',
                'xls': '📊', 'xlsx': '📊',
                'ppt': '📽️', 'pptx': '📽️'
            };
            return icons[ext] || '📎';
        }

        // 显示文件消息
        function showFileMessage(fileData, senderName, msgId, isSent) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message ' + (isSent ? 'sent' : 'received') + ' file-message';
            messageEl.dataset.id = msgId;
            messageEl.dataset.fileId = fileData.fileId;
            messageEl.dataset.downloaded = 'false';

            const timerText = isSent ? '文件已发送' : `⏱️ 下载有效期：${fileData.expiry}秒`;

            messageEl.innerHTML = `
                <div class="file-info">
                    <span class="file-icon">${getFileIcon(fileData.name)}</span>
                    <div class="file-details">
                        <div class="file-name">${fileData.name}</div>
                        <div class="file-size">${formatFileSize(fileData.size)}</div>
                    </div>
                </div>
                <div class="file-timer">${timerText}</div>
                <button class="btn-download" data-file-id="${fileData.fileId}" ${isSent ? 'disabled style="background:#666;"' : ''}>
                    ${isSent ? '已发送' : '下载文件'}
                </button>
                <div class="file-status" id="status-${fileData.fileId}"></div>
            `;

            if (!isSent) {
                const downloadBtn = messageEl.querySelector('.btn-download');
                downloadBtn.addEventListener('click', function() {
                    downloadFile(fileData, msgId);
                });
            }

            document.getElementById('messages').appendChild(messageEl);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            if (!isSent) {
                playNotificationSound();
            }

            // 启动文件过期倒计时
            if (!isSent) {
                startFileExpiryTimer(fileData.fileId, fileData.expiry, msgId);
            }

            // 消息焚毁倒计时
            setTimeout(() => {
                burnMessage(msgId);
            }, burnTime * 1000);
        }

        // 启动文件过期倒计时
        function startFileExpiryTimer(fileId, expiry, msgId) {
            let remaining = expiry;
            const statusEl = document.getElementById('status-' + fileId);

            const timer = setInterval(() => {
                remaining--;

                if (remaining <= 0) {
                    clearInterval(timer);
                    // 检查是否已下载
                    const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
                    if (msgEl && msgEl.dataset.downloaded !== 'true') {
                        statusEl.textContent = '链接已失效';
                        statusEl.className = 'file-status expired';
                        const btn = msgEl.querySelector('.btn-download');
                        if (btn) {
                            btn.disabled = true;
                            btn.textContent = '已失效';
                            btn.style.background = '#666';
                        }
                        const timerEl = msgEl.querySelector('.file-timer');
                        if (timerEl) timerEl.textContent = '⏱️ 下载有效期已过';
                    }
                } else {
                    const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
                    if (msgEl && msgEl.dataset.downloaded !== 'true') {
                        statusEl.textContent = `剩余 ${remaining} 秒`;
                    }
                }
            }, 1000);
        }

        // 发送文件
        function sendFile(file) {
            if (!conn) {
                alert('请先建立连接！');
                return;
            }

            const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            const fileData = {
                type: 'file',
                fileId: fileId,
                name: file.name,
                size: file.size,
                expiry: fileDownloadExpiry,
                totalChunks: Math.ceil(file.size / (64 * 1024)) // 每块64KB
            };

            // 显示发送的文件消息
            showFileMessage(fileData, userName, fileData.fileId, true);

            // 分块发送文件
            const chunkSize = 64 * 1024; // 64KB per chunk
            let offset = 0;
            let chunkIndex = 0;

            function sendChunk() {
                const chunk = file.slice(offset, offset + chunkSize);
                const reader = new FileReader();

                reader.onload = function(e) {
                    const chunkData = {
                        type: 'file-chunk',
                        fileId: fileId,
                        chunkIndex: chunkIndex,
                        totalChunks: fileData.totalChunks,
                        data: e.target.result
                    };

                    conn.send(chunkData);

                    offset += chunkSize;
                    chunkIndex++;

                    if (offset < file.size) {
                        // 继续发送下一块
                        setTimeout(sendChunk, 10);
                    } else {
                        // 文件发送完成
                        const msgEl = document.querySelector('[data-id="' + fileId + '"]');
                        if (msgEl) {
                            const statusEl = document.getElementById('status-' + fileId);
                            statusEl.textContent = '已发送完毕';
                            statusEl.className = 'file-status downloaded';
                        }
                    }
                };

                reader.readAsDataURL(chunk);
            }

            // 先发送文件元数据
            conn.send(fileData);
            // 开始发送文件内容
            sendChunk();
        }

        // 接收文件块
        const receivedFileChunks = {};

        function receiveFile(data) {
            if (data.type === 'file') {
                // 初始化文件接收
                receivedFileChunks[data.fileId] = {
                    name: data.name,
                    size: data.size,
                    expiry: data.expiry,
                    chunks: [],
                    totalChunks: data.totalChunks,
                    received: 0
                };

                // 显示文件消息
                showFileMessage(data, data.name, data.fileId, false);
            } else if (data.type === 'file-chunk') {
                // 接收文件块
                const fileId = data.fileId;
                if (!receivedFileChunks[fileId]) {
                    receivedFileChunks[fileId] = { chunks: [], totalChunks: data.totalChunks };
                }

                receivedFileChunks[fileId].chunks[data.chunkIndex] = data.data;
                receivedFileChunks[fileId].received++;

                // 更新进度
                const progress = Math.round((receivedFileChunks[fileId].received / data.totalChunks) * 100);
                const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
                if (msgEl) {
                    const statusEl = document.getElementById('status-' + fileId);
                    statusEl.textContent = `接收中... ${progress}%`;
                }

                // 检查是否接收完成
                if (receivedFileChunks[fileId].received === data.totalChunks) {
                    // 组装完整文件
                    const fileData = receivedFileChunks[fileId];
                    const blob = base64ToBlob(
                        fileData.chunks.join(''),
                        getMimeType(fileData.name)
                    );

                    // 保存到全局变量供下载
                    window['receivedFile_' + fileId] = {
                        blob: blob,
                        name: fileData.name
                    };

                    // 更新状态
                    if (msgEl) {
                        const statusEl = document.getElementById('status-' + fileId);
                        statusEl.textContent = '已接收，可下载';
                        statusEl.className = 'file-status downloaded';
                    }
                }
            }
        }

        // 下载文件
        function downloadFile(fileData, msgId) {
            const fileId = fileData.fileId;
            const receivedFile = window['receivedFile_' + fileId];

            if (!receivedFile) {
                alert('文件尚未接收完成，请稍候');
                return;
            }

            // 检查是否已下载过
            const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
            if (msgEl && msgEl.dataset.downloaded === 'true') {
                alert('此文件已下载过，链接已失效');
                return;
            }

            // 创建下载链接
            const url = URL.createObjectURL(receivedFile.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = receivedFile.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // 标记为已下载
            if (msgEl) {
                msgEl.dataset.downloaded = 'true';
                const statusEl = document.getElementById('status-' + fileId);
                statusEl.textContent = '已下载';
                statusEl.className = 'file-status downloaded';
                const btn = msgEl.querySelector('.btn-download');
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = '已下载';
                    btn.style.background = '#666';
                }
                const timerEl = msgEl.querySelector('.file-timer');
                if (timerEl) timerEl.textContent = '✓ 文件已保存';
            }

            // 清理内存
            delete window['receivedFile_' + fileId];
        }

        // Base64转Blob
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }

        // 获取MIME类型
        function getMimeType(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const mimeTypes = {
                'pdf': 'application/pdf',
                'doc': 'application/msword',
                'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'txt': 'text/plain',
                'jpg': 'image/jpeg',
                'jpeg': 'image/jpeg',
                'png': 'image/png',
                'gif': 'image/gif',
                'mp4': 'video/mp4',
                'mp3': 'audio/mpeg',
                'zip': 'application/zip'
            };
            return mimeTypes[ext] || 'application/octet-stream';
        }

        function showMessage(content, senderName, msgId, isSent) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message ' + (isSent ? 'sent' : 'received');
            messageEl.dataset.id = msgId;

            messageEl.innerHTML = `
                <div style="font-size:0.8rem;opacity:0.8;margin-bottom:5px;">${senderName}</div>
                <div>${content}</div>
                <div class="message-time">${new Date().toLocaleTimeString()}</div>
            `;

            document.getElementById('messages').appendChild(messageEl);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            if (!isSent) {
                playNotificationSound();
            }

            setTimeout(() => {
                burnMessage(msgId);
            }, burnTime * 1000);
        }

        function burnMessage(msgId) {
            const msgEl = document.querySelector('[data-id="' + msgId + '"]');
            if (msgEl) {
                msgEl.style.opacity = '0';
                msgEl.style.transform = 'scale(0.8)';
                msgEl.style.transition = 'all 0.5s ease';
                setTimeout(() => {
                    msgEl.remove();
                }, 500);

                if (!isHost && conn) {
                    conn.send({ type: 'burn', id: msgId });
                }
            }
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value.trim();
            if (!content) return;

            const msgId = Date.now().toString();
            showMessage(content, userName, msgId, true);

            if (conn) {
                conn.send({
                    type: 'message',
                    content: content,
                    name: userName,
                    id: msgId,
                    burnTime: burnTime
                });
            }

            document.getElementById('messageInput').value = '';
        }

        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // 文件选择处理
        document.getElementById('fileBtn').addEventListener('click', function() {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // 显示文件预览
                const preview = document.getElementById('filePreview');
                const previewName = document.getElementById('filePreviewName');
                preview.classList.add('active');
                previewName.textContent = '📎 ' + file.name + ' (' + formatFileSize(file.size) + ')';
                pendingFile = file;
            }
        });

        document.getElementById('filePreviewRemove').addEventListener('click', function() {
            document.getElementById('filePreview').classList.remove('active');
            document.getElementById('fileInput').value = '';
            pendingFile = null;
        });

        // 绑定事件
        document.getElementById('createBtn').addEventListener('click', createRoom);
        document.getElementById('joinBtn').addEventListener('click', showJoinSection);
        document.getElementById('copyBtn').addEventListener('click', copyInviteCode);
        document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
        document.getElementById('backBtn').addEventListener('click', showNameSection);
        document.getElementById('sendBtn').addEventListener('click', function() {
            // 优先发送文件
            if (pendingFile) {
                sendFile(pendingFile);
                document.getElementById('filePreview').classList.remove('active');
                document.getElementById('fileInput').value = '';
                pendingFile = null;
            } else {
                sendMessage();
            }
        });
        document.getElementById('reloadBtn').addEventListener('click', function() { location.reload(); });

        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (pendingFile) {
                    sendFile(pendingFile);
                    document.getElementById('filePreview').classList.remove('active');
                    document.getElementById('fileInput').value = '';
                    pendingFile = null;
                } else {
                    sendMessage();
                }
            }
        });

        document.getElementById('codeInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                joinRoom();
            }
        });
    </script>
</body>
</html>
