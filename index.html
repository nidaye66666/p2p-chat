<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>即时通讯</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text2: #999;
  --accent: #f59e0b;
  --danger: #ef4444;
  --green: #22c55e;
  --blue: #3b82f6;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
/* 屏幕切换 */
.screen{display:none;flex-direction:column;height:100%;width:100%}
.screen.active{display:flex}

/* ===== 首页 ===== */
#screen-home{
  justify-content:center;align-items:center;gap:32px;padding:24px;
}
.logo{
  font-size:56px;animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
.app-title{font-size:28px;font-weight:700;letter-spacing:2px}
.app-subtitle{font-size:14px;color:var(--text2);margin-top:-16px}
.home-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:280px}
.btn{
  padding:14px 28px;border-radius:var(--radius);font-size:16px;font-weight:600;
  border:none;cursor:pointer;transition:all .2s;text-align:center;
  font-family:inherit;letter-spacing:1px;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn-small{padding:8px 16px;font-size:13px;border-radius:var(--radius-sm)}

/* ===== 握手页面 ===== */
#screen-create,#screen-join{
  padding:20px;gap:16px;overflow-y:auto;
}
.handshake-header{text-align:center;margin-top:8px}
.handshake-header h2{font-size:20px;margin-bottom:4px}
.handshake-header p{font-size:13px;color:var(--text2)}

.step-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.step-label{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:1px;margin-bottom:8px}
.step-title{font-size:15px;font-weight:600;margin-bottom:12px}
.code-box{
  width:100%;min-height:80px;max-height:140px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;
  font-family:monospace;font-size:11px;color:var(--text2);
  word-break:break-all;overflow-y:auto;resize:none;
  line-height:1.5;
}
.code-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;
  font-family:monospace;font-size:11px;color:var(--text);
  resize:none;outline:none;line-height:1.5;
}
.code-input:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn{flex:1}
.status-msg{
  font-size:13px;color:var(--text2);text-align:center;padding:8px;
}
.status-msg.connected{color:var(--green)}

/* ===== 聊天页面 ===== */
#screen-chat{padding:0}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.chat-header .title{font-size:16px;font-weight:600}
.conn-dot{
  width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;
}
.conn-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.conn-dot.off{background:var(--danger);box-shadow:0 0 6px var(--danger)}
.conn-dot.connecting{background:var(--accent);animation:pulse 1s infinite}

.messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:10px;
}
.msg-row{display:flex;flex-direction:column;max-width:80%}
.msg-row.me{align-self:flex-end;align-items:flex-end}
.msg-row.peer{align-self:flex-start;align-items:flex-start}

.msg-bubble{
  padding:12px 16px;border-radius:var(--radius);
  font-size:14px;line-height:1.5;position:relative;
  word-break:break-word;
}
.msg-row.me .msg-bubble{background:var(--accent);color:#000;border-bottom-right-radius:4px}
.msg-row.peer .msg-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}

/* 未读消息 - 模糊遮罩 */
.msg-bubble.unread{
  filter:blur(6px);cursor:pointer;position:relative;
  -webkit-filter:blur(6px);
}
.msg-bubble.unread::after{
  content:"点击查看";position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);font-size:13px;font-weight:600;
  background:rgba(26,26,26,.7);border-radius:inherit;
  z-index:1;
}
.msg-row.me .msg-bubble.unread::after{color:#000;background:rgba(245,158,11,.6)}

/* 已焚毁 */
.msg-bubble.burned{
  opacity:0;transform:scale(.8);transition:all .4s;
  pointer-events:none;
}

.msg-time{
  font-size:11px;color:var(--text2);margin-top:4px;padding:0 4px;
}
.msg-status{font-size:10px;color:var(--text2)}

/* 图片消息 */
.msg-image{
  max-width:200px;max-height:200px;border-radius:var(--radius-sm);
  object-fit:cover;cursor:pointer;
}
.msg-image.unread-img{
  filter:blur(20px);-webkit-filter:blur(20px);
}
.img-placeholder{
  width:200px;height:120px;border-radius:var(--radius-sm);
  background:var(--surface2);display:flex;align-items:center;
  justify-content:center;font-size:32px;cursor:pointer;
  border:1px dashed var(--border);
}

/* 语音消息 */
.voice-bubble{
  display:flex;align-items:center;gap:10px;min-width:140px;
}
.voice-play-btn{
  width:36px;height:36px;border-radius:50%;background:var(--accent);
  border:none;cursor:pointer;font-size:16px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}
.voice-play-btn:active{transform:scale(.9)}
.voice-play-btn.played{background:var(--border);pointer-events:none}
.voice-waves{
  display:flex;align-items:center;gap:2px;height:24px;
}
.voice-wave{
  width:3px;border-radius:2px;background:var(--accent);
  animation:wave 1s ease-in-out infinite;
}
.voice-wave:nth-child(1){height:12px;animation-delay:0s}
.voice-wave:nth-child(2){height:20px;animation-delay:.1s}
.voice-wave:nth-child(3){height:8px;animation-delay:.2s}
.voice-wave:nth-child(4){height:16px;animation-delay:.3s}
.voice-wave:nth-child(5){height:10px;animation-delay:.4s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
.voice-dur{font-size:12px;color:var(--text2)}

/* 输入区域 */
.chat-input-area{
  padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
}
.chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:10px 16px;font-size:14px;color:var(--text);
  outline:none;font-family:inherit;resize:none;max-height:100px;
}
.chat-input:focus{border-color:var(--accent)}
.icon-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.icon-btn:active{background:var(--border);transform:scale(.9)}
.icon-btn.send{background:var(--accent);color:#000;font-size:20px}

/* 录音按钮 */
.record-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--danger);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.record-btn.recording{
  background:var(--danger);color:#fff;animation:pulse .6s infinite;
  box-shadow:0 0 16px var(--danger);
}

/* 图片查看器 */
#image-modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.95);flex-direction:column;
  align-items:center;justify-content:center;
}
#image-modal.open{display:flex}
#image-modal img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px}
#image-modal .close-modal{
  position:absolute;top:20px;right:20px;
  width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);
  border:none;color:#fff;font-size:20px;cursor:pointer;
}

/* Toast */
#toast-container{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  background:var(--surface);border:1px solid var(--border);
  padding:10px 20px;border-radius:20px;font-size:13px;
  color:var(--text);box-shadow:var(--shadow);
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* 倒计时文字 */
.burn-countdown{
  font-size:11px;color:var(--danger);margin-top:4px;
}

/* 空状态 */
.empty-chat{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:14px;text-align:center;padding:24px;
}

/* 隐藏 file input */
.hidden-input{display:none}
</style>
</head>
<body>

<!-- ===== 首页 ===== -->
<div id="screen-home" class="screen active">
  <div class="logo">🔥</div>
  <div class="app-title">即时通讯</div>
  <div class="app-subtitle">P2P加密 · 已读即毁 · 不落痕迹</div>
  <div class="home-btns">
    <button class="btn btn-primary" onclick="app.startCreate()">创建聊天</button>
    <button class="btn btn-outline" onclick="app.startJoin()">加入聊天</button>
  </div>
  <div style="font-size:11px;color:var(--text2);text-align:center;margin-top:16px">
    支持文字、图片、语音消息<br>点对点加密，消息读后即焚
  </div>
</div>

<!-- ===== 创建聊天（Host） ===== -->
<div id="screen-create" class="screen">
  <div class="handshake-header">
    <h2>创建聊天</h2>
    <p>你将生成一个邀请码发送给对方</p>
  </div>
  <div class="step-card">
    <div class="step-label">步骤 1</div>
    <div class="step-title">复制邀请链接发送给对方</div>
    <div id="invite-code-box" class="code-box" style="min-height:60px;display:flex;align-items:center;justify-content:center;color:var(--text2)">
      正在生成邀请链接...
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-small" id="copy-invite-btn" onclick="app.copyInviteCode()" disabled>复制邀请链接</button>
    </div>
  </div>
  <div class="step-card">
    <div class="step-label">步骤 2</div>
    <div class="step-title">粘贴对方发回的确认链接</div>
    <textarea id="answer-input" class="code-input" placeholder="请在此粘贴对方发回的确认链接..." rows="3"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary btn-small" onclick="app.submitAnswer()">确认连接</button>
    </div>
  </div>
  <div id="create-status" class="status-msg"></div>
  <button class="btn btn-outline btn-small" style="margin-top:auto" onclick="app.goHome()">返回</button>
</div>

<!-- ===== 加入聊天（Guest） ===== -->
<div id="screen-join" class="screen">
  <div class="handshake-header">
    <h2>加入聊天</h2>
    <p>点击对方发来的邀请链接，或粘贴邀请码加入聊天</p>
  </div>
  <div class="step-card">
    <div class="step-label">步骤 1</div>
    <div class="step-title">粘贴邀请链接</div>
    <textarea id="offer-input" class="code-input" placeholder="请粘贴邀请链接，或直接点击链接打开..." rows="4"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary btn-small" onclick="app.submitOffer()">解析邀请码</button>
    </div>
  </div>
  <div class="step-card" id="answer-card" style="display:none">
    <div class="step-label">步骤 2</div>
    <div class="step-title">复制确认链接发回给对方</div>
    <div id="answer-code-box" class="code-box" style="min-height:60px;display:flex;align-items:center;justify-content:center;color:var(--text2)">
      正在生成确认码...
    </div>
    <div class="btn-row">
      <button class="btn btn-primary btn-small" id="copy-answer-btn" onclick="app.copyAnswerCode()" disabled>复制确认码</button>
    </div>
  </div>
  <div id="join-status" class="status-msg"></div>
  <button class="btn btn-outline btn-small" style="margin-top:auto" onclick="app.goHome()">返回</button>
</div>

<!-- ===== 聊天页面 ===== -->
<div id="screen-chat" class="screen">
  <div class="chat-header">
    <div>
      <span id="conn-dot" class="conn-dot connecting"></span>
      <span class="title" id="conn-status-text">连接中...</span>
    </div>
    <button class="btn btn-outline btn-small" onclick="app.leaveChat()">退出</button>
  </div>
  <div class="messages" id="messages-container">
    <div class="empty-chat">连接建立后将在此显示消息<br>所有消息读后即焚</div>
  </div>
  <div class="chat-input-area">
    <input type="file" accept="image/*" capture="environment" class="hidden-input" id="image-input" onchange="app.onImageSelected(event)">
    <button class="icon-btn" onclick="document.getElementById('image-input').click()" title="发送图片">🖼</button>
    <button class="record-btn" id="record-btn" title="按住录音">🎤</button>
    <textarea class="chat-input" id="text-input" rows="1" placeholder="输入消息..." onkeydown="app.onInputKey(event)"></textarea>
    <button class="icon-btn send" onclick="app.sendText()" title="发送">↑</button>
  </div>
</div>

<!-- ===== 图片查看器 ===== -->
<div id="image-modal" onclick="app.closeImageViewer()">
  <button class="close-modal">✕</button>
  <img id="image-modal-img" src="" alt="查看图片" oncontextmenu="return false">
</div>

<!-- ===== Toast ===== -->
<div id="toast-container"></div>

<script>
// ==================== 协议检测 ====================
if (location.protocol === 'file:') {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;padding:24px;background:#0f0f0f;color:#e0e0e0;font-family:sans-serif;text-align:center">
      <div>
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h2 style="margin-bottom:8px">请通过本地服务器打开</h2>
        <p style="color:#999;margin-bottom:16px">浏览器安全策略禁止从 file:// 直接运行此应用<br>WebRTC、剪贴板和麦克风/摄像头需要 HTTP 协议</p>
        <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:16px;text-align:left;display:inline-block;margin-bottom:16px">
          <div style="color:#f59e0b;font-weight:600;margin-bottom:8px">启动方式：</div>
          <div style="color:#ccc;font-size:13px;line-height:1.8">
            ① 双击 <b>start.bat</b> 启动本地服务器<br>
            ② 浏览器访问 <b>http://localhost:8080</b><br>
          </div>
        </div>
        <p style="color:#666;font-size:12px">通过免费静态托管部署（如 GitHub Pages）后即可跨网络使用<br>手机和电脑各自打开链接即可</p>
      </div>
    </div>`;
  throw new Error('请通过 HTTP 服务器打开此页面，不要直接双击 HTML 文件');
}

// ==================== WebRTC 管理器 ====================
class WebRTCManager {
  constructor() {
    this.pc = null;
    this.dc = null;
    this.onMessage = null;
    this.onConnected = null;
    this.onDisconnected = null;
    this.isHost = false;
  }

  get ICE_SERVERS() {
    return {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ]
    };
  }

  async createOffer() {
    this.isHost = true;
    this.pc = new RTCPeerConnection(this.ICE_SERVERS);
    this._setupEvents();
    this.dc = this.pc.createDataChannel('chat', { ordered: true });
    this._setupDataChannel();
    const offer = await this.pc.createOffer();
    await this.pc.setLocalDescription(offer);
    await this._waitForIceGathering();
    return this._encode(this.pc.localDescription);
  }

  async acceptOffer(encodedOffer) {
    this.isHost = false;
    const offerDesc = this._decode(encodedOffer);
    if (!offerDesc || !offerDesc.sdp || !offerDesc.type) {
      throw new Error('无效的邀请码');
    }
    this.pc = new RTCPeerConnection(this.ICE_SERVERS);
    this._setupEvents();
    await this.pc.setRemoteDescription(new RTCSessionDescription(offerDesc));
    const answer = await this.pc.createAnswer();
    await this.pc.setLocalDescription(answer);
    await this._waitForIceGathering();
    return this._encode(this.pc.localDescription);
  }

  async acceptAnswer(encodedAnswer) {
    const answerDesc = this._decode(encodedAnswer);
    if (!answerDesc || !answerDesc.sdp || !answerDesc.type) {
      throw new Error('无效的确认码');
    }
    await this.pc.setRemoteDescription(new RTCSessionDescription(answerDesc));
  }

  _setupEvents() {
    this.pc.oniceconnectionstatechange = () => {
      const state = this.pc.iceConnectionState;
      if (state === 'connected' || state === 'completed') {
        this.onConnected?.();
      } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
        this.onDisconnected?.();
      }
    };
    this.pc.ondatachannel = (event) => {
      this.dc = event.channel;
      this._setupDataChannel();
    };
  }

  _setupDataChannel() {
    if (!this.dc) return;
    this.dc.onopen = () => { this.onConnected?.(); };
    this.dc.onclose = () => { this.onDisconnected?.(); };

    let pendingBinaryMeta = null;
    this.dc.onmessage = (event) => {
      if (typeof event.data === 'string') {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'msg-meta') {
            pendingBinaryMeta = msg;
          } else {
            this.onMessage?.(msg);
          }
        } catch (e) {
          // 非JSON文本消息
        }
      } else if (event.data instanceof ArrayBuffer) {
        if (pendingBinaryMeta) {
          this.onMessage?.({ ...pendingBinaryMeta, binary: event.data });
          pendingBinaryMeta = null;
        }
      }
    };
  }

  _waitForIceGathering(timeoutMs = 30000) {
    return new Promise((resolve, reject) => {
      if (this.pc.iceGatheringState === 'complete') { resolve(); return; }
      const timer = setTimeout(() => {
        // 超时也继续，部分候选总比没有好
        resolve();
      }, timeoutMs);
      this.pc.onicegatheringstatechange = () => {
        if (this.pc.iceGatheringState === 'complete') {
          clearTimeout(timer);
          resolve();
        }
      };
    });
  }

  _encode(desc) {
    return btoa(JSON.stringify(desc));
  }

  _decode(str) {
    try {
      return JSON.parse(atob(str.trim()));
    } catch {
      return null;
    }
  }

  sendString(obj) {
    if (this.dc && this.dc.readyState === 'open') {
      this.dc.send(JSON.stringify(obj));
    }
  }

  sendBinary(meta, arrayBuffer) {
    if (this.dc && this.dc.readyState === 'open') {
      this.dc.send(JSON.stringify(meta));
      this.dc.send(arrayBuffer);
    }
  }

  destroy() {
    if (this.dc) { this.dc.close(); this.dc = null; }
    if (this.pc) { this.pc.close(); this.pc = null; }
  }
}

// ==================== 媒体管理器 ====================
class MediaManager {
  constructor() {
    this.recorder = null;
    this.recordingStream = null;
    this.recordingChunks = [];
    this.recordingStartTime = 0;
    this.onRecordingStateChange = null;
  }

  async startRecording() {
    this.recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    this.recorder = new MediaRecorder(this.recordingStream, { mimeType });
    this.recordingChunks = [];
    this.recorder.ondataavailable = e => {
      if (e.data.size > 0) this.recordingChunks.push(e.data);
    };
    this.recorder.start();
    this.recordingStartTime = Date.now();
    this.onRecordingStateChange?.(true);
  }

  stopRecording() {
    return new Promise((resolve) => {
      if (!this.recorder || this.recorder.state === 'inactive') { resolve(null); return; }
      this.recorder.onstop = async () => {
        const duration = Math.round((Date.now() - this.recordingStartTime) / 1000);
        const blob = new Blob(this.recordingChunks, { type: this.recorder.mimeType });
        const arrayBuffer = await blob.arrayBuffer();
        if (this.recordingStream) {
          this.recordingStream.getTracks().forEach(t => t.stop());
          this.recordingStream = null;
        }
        this.recorder = null;
        this.recordingChunks = [];
        this.onRecordingStateChange?.(false);
        resolve({ arrayBuffer, duration, mimeType: blob.type, size: blob.size });
      };
      this.recorder.stop();
    });
  }

  cancelRecording() {
    if (this.recorder && this.recorder.state === 'recording') {
      this.recorder.onstop = () => {};
      this.recorder.stop();
    }
    if (this.recordingStream) {
      this.recordingStream.getTracks().forEach(t => t.stop());
      this.recordingStream = null;
    }
    this.recorder = null;
    this.recordingChunks = [];
    this.onRecordingStateChange?.(false);
  }

  isRecording() {
    return this.recorder && this.recorder.state === 'recording';
  }

  static async fileToArrayBuffer(file) {
    return await file.arrayBuffer();
  }
}

// ==================== 消息处理器 ====================
const MSG_BURN_TIMEOUT = 30; // 秒

class MessageHandler {
  constructor() {
    this.messages = new Map(); // id -> {id, type, content, sender, status, timestamp}
    this.burnTimers = new Map();
    this.currentViewingImage = null;
  }

  addMessage(msg) {
    this.messages.set(msg.id, msg);
  }

  getMessage(id) {
    return this.messages.get(id);
  }

  burnMessage(id) {
    const msg = this.messages.get(id);
    if (!msg) return;
    msg.status = 'burned';
    if (this.burnTimers.has(id)) {
      clearTimeout(this.burnTimers.get(id));
      this.burnTimers.delete(id);
    }
    if (msg._burnTimer) {
      clearInterval(msg._burnTimer);
      msg._burnTimer = null;
    }
    if (msg._objectUrl) {
      URL.revokeObjectURL(msg._objectUrl);
      msg._objectUrl = null;
    }
    if (msg._audioUrl) {
      URL.revokeObjectURL(msg._audioUrl);
      msg._audioUrl = null;
    }
    setTimeout(() => { this.messages.delete(id); }, 500);
  }

  scheduleBurn(id, callback) {
    if (this.burnTimers.has(id)) {
      clearTimeout(this.burnTimers.get(id));
    }
    const timer = setTimeout(() => {
      this.burnTimers.delete(id);
      callback(id);
    }, MSG_BURN_TIMEOUT * 1000);
    this.burnTimers.set(id, timer);
  }

  cancelBurnSchedule(id) {
    if (this.burnTimers.has(id)) {
      clearTimeout(this.burnTimers.get(id));
      this.burnTimers.delete(id);
    }
  }

  cleanup() {
    this.burnTimers.forEach(t => clearTimeout(t));
    this.burnTimers.clear();
    this.messages.forEach(msg => {
      if (msg._burnTimer) clearInterval(msg._burnTimer);
      if (msg._objectUrl) URL.revokeObjectURL(msg._objectUrl);
      if (msg._audioUrl) URL.revokeObjectURL(msg._audioUrl);
    });
    this.messages.clear();
  }
}

// ==================== 应用主控 ====================
class App {
  constructor() {
    this.rtc = new WebRTCManager();
    this.media = new MediaManager();
    this.msgs = new MessageHandler();
    this.inviteCode = null;
    this.answerCode = null;
    this.currentScreen = 'home';

    this._bindRTCEvents();
    this._bindMediaEvents();
    this._bindRecordButton();
  }

  // ===== 工具方法 =====
  _getBaseUrl() {
    const u = new URL(location.href);
    u.search = '';
    u.hash = '';
    return u.toString();
  }

  _makeInviteUrl(code) {
    return this._getBaseUrl() + '?invite=' + encodeURIComponent(code);
  }

  _makeConfirmUrl(code) {
    return this._getBaseUrl() + '?confirm=' + encodeURIComponent(code);
  }

  _extractCodeFromUrl(urlStr, paramName) {
    try {
      const u = new URL(urlStr.trim());
      const val = u.searchParams.get(paramName);
      return val ? decodeURIComponent(val) : urlStr.trim();
    } catch {
      return urlStr.trim();
    }
  }

  // ===== URL 参数自动识别 =====
  initFromUrl() {
    const params = new URLSearchParams(location.search);
    const invite = params.get('invite');
    const confirm = params.get('confirm');
    if (invite) {
      // 对方打开邀请链接：自动进入加入流程
      this.showScreen('join');
      document.getElementById('offer-input').value = '';
      document.getElementById('answer-code-box').textContent = '';
      document.getElementById('copy-answer-btn').disabled = true;
      document.getElementById('answer-card').style.display = 'none';
      this.submitOffer(decodeURIComponent(invite));
    } else if (confirm) {
      // 确认链接必须粘贴到创建方的原页面，直接打开无效
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;padding:24px;background:#0f0f0f;color:#e0e0e0;font-family:sans-serif;text-align:center">
          <div>
            <div style="font-size:48px;margin-bottom:16px">📋</div>
            <h2 style="margin-bottom:8px">请复制此链接</h2>
            <p style="color:#999;margin-bottom:16px">这是确认链接，需要粘贴到<br><b>创建聊天的页面</b>的输入框中</p>
            <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:16px;text-align:left;display:inline-block;margin-bottom:16px">
              <div style="color:#f59e0b;font-weight:600;margin-bottom:8px">确认链接：</div>
              <div id="confirm-url-display" style="color:#ccc;font-size:12px;word-break:break-all;max-width:320px;line-height:1.6">${location.href.replace(/</g,'&lt;')}</div>
            </div>
            <button class="btn btn-primary" style="display:block;width:100%;max-width:280px;margin:0 auto" onclick="navigator.clipboard.writeText(location.href).then(()=>{this.textContent='已复制！请回到创建聊天的页面粘贴'})">复制链接</button>
          </div>
        </div>`;
      throw new Error('确认链接无法直接打开，请复制后粘贴到创建聊天页面');
    }
  }

  // ===== 屏幕导航 =====
  showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const screen = document.getElementById('screen-' + name);
    if (screen) screen.classList.add('active');
    this.currentScreen = name;
  }

  goHome() {
    this.rtc.destroy();
    this.msgs.cleanup();
    this.inviteCode = null;
    this.answerCode = null;
    this._clearMessagesUI();
    this.showScreen('home');
    this._updateConnectionStatus('off');
  }

  // ===== 创建聊天（Host） =====
  async startCreate() {
    this.showScreen('create');
    document.getElementById('invite-code-box').textContent = '正在生成邀请码...';
    document.getElementById('copy-invite-btn').disabled = true;
    document.getElementById('answer-input').value = '';
    document.getElementById('create-status').textContent = '';

    try {
      this.inviteCode = await this.rtc.createOffer();
      const url = this._makeInviteUrl(this.inviteCode);
      document.getElementById('invite-code-box').textContent = url;
      document.getElementById('copy-invite-btn').disabled = false;
    } catch (e) {
      document.getElementById('invite-code-box').textContent = '生成失败：' + e.message;
    }
  }

  copyInviteCode() {
    if (!this.inviteCode) return;
    const url = this._makeInviteUrl(this.inviteCode);
    navigator.clipboard.writeText(url).then(() => {
      this._toast('邀请链接已复制！请通过微信等方式发送给对方');
    }).catch(() => {
      const el = document.getElementById('invite-code-box');
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      this._toast('请手动复制链接（Ctrl+C）');
    });
  }

  copyAnswerCode() {
    if (!this.answerCode) return;
    const url = this._makeConfirmUrl(this.answerCode);
    navigator.clipboard.writeText(url).then(() => {
      this._toast('确认链接已复制！请发回给对方');
    }).catch(() => {
      const el = document.getElementById('answer-code-box');
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      this._toast('请手动复制链接（Ctrl+C）');
    });
  }

  async submitAnswer() {
    let answerStr = document.getElementById('answer-input').value.trim();
    if (!answerStr) { this._toast('请先粘贴对方发回的确认链接'); return; }
    // 支持粘贴完整链接，自动提取确认码
    answerStr = this._extractCodeFromUrl(answerStr, 'confirm');
    document.getElementById('create-status').textContent = '正在连接...';
    try {
      await this.rtc.acceptAnswer(answerStr);
    } catch (e) {
      document.getElementById('create-status').textContent = '连接失败：' + e.message;
    }
  }

  // ===== 加入聊天（Guest） =====
  startJoin() {
    this.showScreen('join');
    document.getElementById('offer-input').value = '';
    document.getElementById('answer-code-box').textContent = '';
    document.getElementById('copy-answer-btn').disabled = true;
    document.getElementById('answer-card').style.display = 'none';
    document.getElementById('join-status').textContent = '';
  }

  async submitOffer(offerCode) {
    // offerCode 可由 URL 自动传入或手动粘贴
    let offerStr = offerCode || document.getElementById('offer-input').value.trim();
    if (!offerStr) { this._toast('请先粘贴邀请码或打开邀请链接'); return; }
    // 支持粘贴完整链接，自动提取邀请码
    offerStr = this._extractCodeFromUrl(offerStr, 'invite');
    document.getElementById('join-status').textContent = '正在解析邀请码...';
    try {
      this.answerCode = await this.rtc.acceptOffer(offerStr);
      const url = this._makeConfirmUrl(this.answerCode);
      document.getElementById('answer-card').style.display = 'block';
      document.getElementById('answer-code-box').textContent = url;
      document.getElementById('copy-answer-btn').disabled = false;
      document.getElementById('join-status').textContent = '确认链接已生成，点击复制发回给对方';
    } catch (e) {
      document.getElementById('join-status').textContent = '解析失败：' + e.message;
    }
  }

  // ===== 离开聊天 =====
  leaveChat() {
    this.msgs.cleanup();
    this.rtc.destroy();
    this._clearMessagesUI();
    this.goHome();
  }

  // ===== 发送消息 =====
  sendText() {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text) return;
    if (!this.rtc.dc || this.rtc.dc.readyState !== 'open') {
      this._toast('连接已断开，无法发送');
      return;
    }
    const msg = {
      id: crypto.randomUUID(),
      type: 'text',
      content: text,
      sender: 'me',
      status: 'sent',
      timestamp: Date.now()
    };
    this.msgs.addMessage(msg);
    this._renderMessage(msg);
    this.rtc.sendString({ type: 'text', id: msg.id, content: text, timestamp: msg.timestamp });
    input.value = '';
    input.style.height = 'auto';
  }

  async onImageSelected(event) {
    const file = event.target.files[0];
    if (!file) return;
    event.target.value = '';
    if (file.size > 5 * 1024 * 1024) {
      this._toast('图片最大 5MB');
      return;
    }
    if (!this.rtc.dc || this.rtc.dc.readyState !== 'open') {
      this._toast('连接已断开，无法发送');
      return;
    }
    const arrayBuffer = await MediaManager.fileToArrayBuffer(file);
    const id = crypto.randomUUID();
    const msg = {
      id, type: 'image', sender: 'me', status: 'sent',
      timestamp: Date.now(), mimeType: file.type, size: arrayBuffer.byteLength,
      _objectUrl: URL.createObjectURL(file)
    };
    this.msgs.addMessage(msg);
    this._renderMessage(msg);
    this.rtc.sendBinary(
      { type: 'msg-meta', id, msgType: 'image', mimeType: file.type, size: arrayBuffer.byteLength, timestamp: msg.timestamp },
      arrayBuffer
    );
  }

  async sendVoice(arrayBuffer, duration, mimeType) {
    if (!this.rtc.dc || this.rtc.dc.readyState !== 'open') { return; }
    const id = crypto.randomUUID();
    const blob = new Blob([arrayBuffer], { type: mimeType });
    const msg = {
      id, type: 'voice', sender: 'me', status: 'sent',
      timestamp: Date.now(), duration, mimeType,
      _audioUrl: URL.createObjectURL(blob)
    };
    this.msgs.addMessage(msg);
    this._renderMessage(msg);
    this.rtc.sendBinary(
      { type: 'msg-meta', id, msgType: 'voice', mimeType, duration, size: arrayBuffer.byteLength, timestamp: msg.timestamp },
      arrayBuffer
    );
  }

  // ===== 接收消息 =====
  _onRTCMessage(msg) {
    if (msg.type === 'text') {
      const message = {
        id: msg.id,
        type: 'text',
        content: msg.content,
        sender: 'peer',
        status: 'unread',
        timestamp: msg.timestamp
      };
      this.msgs.addMessage(message);
      this._renderMessage(message);
      // 发送确认
      this.rtc.sendString({ type: 'ack', id: msg.id });
    } else if (msg.type === 'msg-meta' && msg.binary) {
      const blob = new Blob([msg.binary], { type: msg.mimeType });
      const message = {
        id: msg.id,
        type: msg.msgType,
        sender: 'peer',
        status: 'unread',
        timestamp: msg.timestamp,
        mimeType: msg.mimeType,
        duration: msg.duration,
        size: msg.size,
        _objectUrl: msg.msgType === 'image' ? URL.createObjectURL(blob) : null,
        _audioUrl: msg.msgType === 'voice' ? URL.createObjectURL(blob) : null
      };
      this.msgs.addMessage(message);
      this._renderMessage(message);
      this.rtc.sendString({ type: 'ack', id: msg.id });
    } else if (msg.type === 'ack') {
      const existing = this.msgs.getMessage(msg.id);
      if (existing) {
        existing.status = 'delivered';
        this._updateMessageUI(msg.id);
      }
    } else if (msg.type === 'burn') {
      const existing = this.msgs.getMessage(msg.id);
      if (existing && existing.status !== 'burned') {
        existing.status = 'burned';
        this._burnMessageUI(msg.id);
        this.msgs.burnMessage(msg.id);
      }
    }
  }

  // ===== 消息焚毁（接收方查看后触发） =====
  burnAfterView(id) {
    const msg = this.msgs.getMessage(id);
    if (!msg || msg.status === 'burned') return;
    // 通知对方焚毁
    this.rtc.sendString({ type: 'burn', id });
    // 本地也焚毁
    msg.status = 'burned';
    this._burnMessageUI(id);
    this.msgs.burnMessage(msg.id);
  }

  // ===== 渲染消息 =====
  _renderMessage(msg) {
    const container = document.getElementById('messages-container');
    // 清除空状态
    const empty = container.querySelector('.empty-chat');
    if (empty) empty.remove();

    const row = document.createElement('div');
    row.className = 'msg-row ' + msg.sender;
    row.id = 'msg-' + msg.id;

    if (msg.type === 'text') {
      this._renderTextBubble(row, msg);
    } else if (msg.type === 'image') {
      this._renderImageBubble(row, msg);
    } else if (msg.type === 'voice') {
      this._renderVoiceBubble(row, msg);
    }

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    row.appendChild(time);

    if (msg.sender === 'me') {
      const status = document.createElement('span');
      status.className = 'msg-status';
      status.id = 'status-' + msg.id;
      status.textContent = msg.status === 'delivered' ? ' 已送达' : msg.status === 'burned' ? ' 已焚毁' : ' 已发送';
      status.style.marginLeft = '4px';
      time.appendChild(status);
    }

    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  _renderTextBubble(row, msg) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.id = 'bubble-' + msg.id;

    if (msg.sender === 'peer' && msg.status === 'unread') {
      bubble.classList.add('unread');
      bubble.textContent = '这是一条加密消息';
      bubble.addEventListener('click', () => this._revealText(msg.id));
    } else if (msg.status === 'burned') {
      bubble.classList.add('burned');
      bubble.textContent = '🔥 消息已焚毁';
    } else {
      bubble.textContent = msg.content;
      if (msg.sender === 'peer' && msg.status === 'viewed') {
        const countdown = document.createElement('div');
        countdown.className = 'burn-countdown';
        countdown.id = 'countdown-' + msg.id;
        bubble.appendChild(countdown);
      }
    }
    row.appendChild(bubble);
  }

  _renderImageBubble(row, msg) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.id = 'bubble-' + msg.id;
    bubble.style.padding = '4px';
    bubble.style.overflow = 'hidden';

    if (msg.status === 'burned') {
      bubble.classList.add('burned');
      bubble.style.padding = '12px 16px';
      bubble.textContent = '🔥 图片已焚毁';
    } else if (msg.sender === 'peer' && msg.status === 'unread') {
      const placeholder = document.createElement('div');
      placeholder.className = 'img-placeholder';
      placeholder.textContent = '🖼';
      placeholder.addEventListener('click', () => this._revealImage(msg.id));
      bubble.appendChild(placeholder);
    } else {
      const img = document.createElement('img');
      img.className = 'msg-image';
      img.src = msg._objectUrl || '';
      if (msg.sender === 'peer') {
        img.addEventListener('click', () => this._viewImageFull(msg.id));
      }
      bubble.appendChild(img);
    }
    row.appendChild(bubble);
  }

  _renderVoiceBubble(row, msg) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.id = 'bubble-' + msg.id;

    if (msg.status === 'burned') {
      bubble.classList.add('burned');
      bubble.textContent = '🔥 语音已焚毁';
    } else {
      const container = document.createElement('div');
      container.className = 'voice-bubble';

      const playBtn = document.createElement('button');
      playBtn.className = 'voice-play-btn';
      playBtn.id = 'play-' + msg.id;
      playBtn.textContent = '▶';
      playBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        this._playVoice(msg.id);
      });

      const waves = document.createElement('div');
      waves.className = 'voice-waves';
      for (let i = 0; i < 5; i++) {
        const wave = document.createElement('div');
        wave.className = 'voice-wave';
        waves.appendChild(wave);
      }

      const dur = document.createElement('span');
      dur.className = 'voice-dur';
      dur.textContent = (msg.duration || '?') + '″';

      container.appendChild(playBtn);
      container.appendChild(waves);
      container.appendChild(dur);
      bubble.appendChild(container);
    }
    row.appendChild(bubble);
  }

  _updateMessageUI(id) {
    const statusEl = document.getElementById('status-' + id);
    if (statusEl) statusEl.textContent = ' 已送达';
  }

  _burnMessageUI(id) {
    const row = document.getElementById('msg-' + id);
    const bubble = document.getElementById('bubble-' + id);
    if (bubble) {
      bubble.classList.add('burned');
      bubble.textContent = '🔥 消息已焚毁';
    }
    const statusEl = document.getElementById('status-' + id);
    if (statusEl) statusEl.textContent = ' 已焚毁';
    // 完全移除
    setTimeout(() => {
      if (row) row.remove();
      this._checkEmpty();
    }, 500);
  }

  _clearMessagesUI() {
    const container = document.getElementById('messages-container');
    container.innerHTML = '<div class="empty-chat">连接建立后将在此显示消息<br>所有消息读后即焚</div>';
  }

  _checkEmpty() {
    const container = document.getElementById('messages-container');
    if (container.children.length === 0) {
      container.innerHTML = '<div class="empty-chat">所有消息已焚毁</div>';
    }
  }

  // ===== 查看消息（接收方） =====
  _revealText(id) {
    const msg = this.msgs.getMessage(id);
    if (!msg || msg.status !== 'unread') return;
    msg.status = 'viewed';
    const bubble = document.getElementById('bubble-' + id);
    if (!bubble) return;
    bubble.classList.remove('unread');
    bubble.textContent = msg.content;

    // 倒计时
    let remaining = MSG_BURN_TIMEOUT;
    const countdown = document.createElement('div');
    countdown.className = 'burn-countdown';
    countdown.textContent = remaining + '秒后焚毁';
    bubble.appendChild(countdown);

    const timer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(timer);
        this.burnAfterView(id);
      } else {
        countdown.textContent = remaining + '秒后焚毁';
      }
    }, 1000);

    // 取消之前的倒计时
    this.msgs.cancelBurnSchedule(id);
    // 存储新的timer引用以便清理
    msg._burnTimer = timer;
  }

  _revealImage(id) {
    const msg = this.msgs.getMessage(id);
    if (!msg || msg.status !== 'unread') return;
    msg.status = 'viewed';

    const bubble = document.getElementById('bubble-' + id);
    if (!bubble) return;
    bubble.innerHTML = '';
    bubble.style.padding = '4px';
    const img = document.createElement('img');
    img.className = 'msg-image';
    img.src = msg._objectUrl || '';
    img.addEventListener('click', () => this._viewImageFull(id));
    bubble.appendChild(img);
  }

  _viewImageFull(id) {
    const msg = this.msgs.getMessage(id);
    if (!msg || msg.status === 'burned') return;
    this.currentViewingImage = id;
    const modal = document.getElementById('image-modal');
    const modalImg = document.getElementById('image-modal-img');
    modalImg.src = msg._objectUrl || '';
    modal.classList.add('open');
  }

  closeImageViewer() {
    const modal = document.getElementById('image-modal');
    modal.classList.remove('open');
    if (this.currentViewingImage) {
      const id = this.currentViewingImage;
      this.currentViewingImage = null;
      const msg = this.msgs.getMessage(id);
      if (msg && msg.sender === 'peer' && msg.status !== 'burned') {
        this.burnAfterView(id);
      }
    }
  }

  _playVoice(id) {
    const msg = this.msgs.getMessage(id);
    if (!msg || msg.status === 'burned') return;
    if (!msg._audioUrl) return;

    const playBtn = document.getElementById('play-' + id);
    if (playBtn) playBtn.classList.add('played');

    const audio = new Audio(msg._audioUrl);
    audio.play().catch(e => {});
    audio.onended = () => {
      if (msg.sender === 'peer') {
        this.burnAfterView(id);
      } else {
        // 自己发送的语音，播放后也焚毁
        msg.status = 'burned';
        this._burnMessageUI(id);
        this.msgs.burnMessage(msg.id);
      }
    };
  }

  // ===== 连接状态 =====
  _bindRTCEvents() {
    this.rtc.onConnected = () => {
      this.showScreen('chat');
      this._updateConnectionStatus('on');
    };
    this.rtc.onDisconnected = () => {
      this._updateConnectionStatus('off');
      this._toast('连接已断开');
    };
    this.rtc.onMessage = (msg) => this._onRTCMessage(msg);
  }

  _updateConnectionStatus(state) {
    const dot = document.getElementById('conn-dot');
    const text = document.getElementById('conn-status-text');
    if (!dot || !text) return;
    dot.className = 'conn-dot ' + (state === 'on' ? 'on' : state === 'off' ? 'off' : 'connecting');
    text.textContent = state === 'on' ? '已连接' : state === 'off' ? '未连接' : '连接中...';
  }

  // ===== 录音按钮 =====
  _bindMediaEvents() {
    this.media.onRecordingStateChange = (recording) => {
      const btn = document.getElementById('record-btn');
      if (recording) {
        btn.classList.add('recording');
        btn.textContent = '⬤';
      } else {
        btn.classList.remove('recording');
        btn.textContent = '🎤';
      }
    };
  }

  _bindRecordButton() {
    const btn = document.getElementById('record-btn');
    let longPressTimer = null;
    let isRecording = false;

    const startRecord = async () => {
      if (isRecording) return;
      try {
        isRecording = true;
        await this.media.startRecording();
      } catch (e) {
        isRecording = false;
        this._toast('无法访问麦克风：' + e.message);
      }
    };

    const stopRecord = async () => {
      if (!isRecording) return;
      isRecording = false;
      const result = await this.media.stopRecording();
      if (result && result.duration > 0) {
        await this.sendVoice(result.arrayBuffer, result.duration, result.mimeType);
      }
    };

    // 鼠标事件
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      longPressTimer = setTimeout(() => startRecord(), 150);
    });
    btn.addEventListener('mouseup', (e) => {
      e.preventDefault();
      clearTimeout(longPressTimer);
      stopRecord();
    });
    btn.addEventListener('mouseleave', () => {
      clearTimeout(longPressTimer);
      if (isRecording) this.media.cancelRecording();
      isRecording = false;
    });

    // 触摸事件
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      longPressTimer = setTimeout(() => startRecord(), 150);
    });
    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      clearTimeout(longPressTimer);
      stopRecord();
    });
    btn.addEventListener('touchcancel', () => {
      clearTimeout(longPressTimer);
      if (isRecording) this.media.cancelRecording();
      isRecording = false;
    });
  }

  // ===== 输入框 =====
  onInputKey(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      this.sendText();
    }
    // 自动调整高度
    setTimeout(() => {
      const input = event.target;
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    }, 0);
  }

  // ===== Toast =====
  _toast(msg) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 2500);
  }
}

// ===== 启动 =====
const app = new App();
app.initFromUrl();
</script>
</body>
</html>
