<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即时通讯</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117; color: #c9d1d9;
            height: 100dvh; display: flex; flex-direction: column;
            overflow: hidden; -webkit-tap-highlight-color: transparent;
        }
        .header { background: #161b22; padding: 12px 16px; text-align: center; border-bottom: 1px solid #30363d; flex-shrink: 0; }
        .header h1 { font-size: 1.1rem; font-weight: 600; color: #58a6ff; letter-spacing: 1px; }
        .status-bar { background: #161b22; padding: 6px; text-align: center; font-size: 0.75rem; color: #8b949e; flex-shrink: 0; border-bottom: 1px solid #21262d; }
        .status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-waiting { background: #d2991d; }
        .status-connected { background: #3fb950; }
        .status-disconnected { background: #f85149; }
        .container { flex: 1; max-width: 600px; margin: 0 auto; width: 100%; overflow: hidden; display: flex; flex-direction: column; }
        .welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; padding: 20px; }
        .welcome-screen label { font-size: 0.85rem; color: #8b949e; }
        .btn {
            border: 1px solid #30363d; padding: 12px 32px; font-size: 0.95rem;
            cursor: pointer; border-radius: 8px; transition: all .2s; font-family: inherit;
            font-weight: 500; background: #21262d; color: #c9d1d9;
        }
        .btn:active { transform: scale(.97); opacity: .8; }
        .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
        .btn-primary:active { background: #2ea043; }
        .btn-file { background: #1f6feb; border-color: #388bfd; color: #fff; padding: 8px 14px; font-size: 0.85rem; border-radius: 20px; }
        .btn-download { background: #d2991d; border-color: #d2991d; color: #000; padding: 6px 14px; font-size: 0.8rem; border-radius: 6px; }
        .btn-download:disabled { opacity: .4; cursor: not-allowed; }
        .input-code {
            padding: 10px 14px; font-size: 0.95rem; border: 1px solid #30363d;
            border-radius: 8px; background: #0d1117; color: #c9d1d9; text-align: center;
            outline: none; font-family: inherit;
        }
        .input-code:focus { border-color: #58a6ff; }
        .invite-code-display { font-size: 2rem; font-weight: 700; color: #58a6ff; letter-spacing: 6px; font-family: monospace; }
        .chat-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .chat-screen.active { display: flex; }
        .chat-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; background: #161b22; border-bottom: 1px solid #21262d;
            flex-shrink: 0; font-size: 0.85rem;
        }
        .chat-header .code-label { color: #58a6ff; font-weight: 600; }
        .messages {
            flex: 1; overflow-y: auto; padding: 12px; display: flex;
            flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch;
        }
        .message { padding: 10px 14px; border-radius: 16px; max-width: 75%; word-break: break-word; font-size: 0.9rem; line-height: 1.45; }
        .message.sent { background: #238636; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.received { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #30363d; }
        .message.file-message { background: #161b22; border: 1px solid #30363d; padding: 12px; max-width: 80%; }
        .message.voice-message { background: #21262d; border: 1px solid #30363d; }
        .message-time { font-size: 0.65rem; opacity: 0.6; margin-top: 4px; }
        .message-sender { font-size: 0.7rem; opacity: 0.6; margin-bottom: 3px; }
        .input-area {
            display: flex; gap: 6px; padding: 10px 12px; align-items: flex-end;
            background: #161b22; border-top: 1px solid #21262d; flex-shrink: 0;
        }
        .message-input {
            flex: 1; padding: 10px 14px; border: 1px solid #30363d; border-radius: 20px;
            background: #0d1117; color: #c9d1d9; resize: none; font-size: 0.9rem;
            outline: none; font-family: inherit; max-height: 100px; line-height: 1.4;
        }
        .message-input:focus { border-color: #58a6ff; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid #30363d;
            background: #21262d; color: #c9d1d9; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all .15s;
        }
        .icon-btn:active { background: #30363d; transform: scale(.92); }
        .icon-btn.send { background: #238636; border-color: #2ea043; color: #fff; }
        .icon-btn.recording { background: #f85149; border-color: #f85149; color: #fff; animation: pulse .7s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(248,81,73,.5); } 50% { box-shadow: 0 0 0 10px rgba(248,81,73,0); } }
        .hint { text-align: center; color: #8b949e; font-size: 0.75rem; padding: 6px; flex-shrink: 0; }
        .disconnected-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .disconnected-overlay.active { display: flex; }
        .disconnected-overlay h2 { color: #f85149; font-size: 1.3rem; margin-bottom: 8px; }
        .disconnected-overlay p { color: #8b949e; margin-bottom: 16px; font-size: 0.85rem; }
        .file-info { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .file-icon { font-size: 1.6rem; }
        .file-details { flex: 1; }
        .file-name { font-weight: 600; margin-bottom: 2px; font-size: 0.85rem; }
        .file-size { font-size: 0.75rem; opacity: 0.7; }
        .file-timer { font-size: 0.78rem; color: #d2991d; margin: 6px 0; }
        .file-status { font-size: 0.75rem; margin-top: 4px; }
        .file-status.expired { color: #f85149; }
        .file-status.downloaded { color: #3fb950; }
        .file-preview { display: none; background: #161b22; border: 1px solid #30363d; padding: 8px 12px; border-radius: 10px; margin: 0 12px 4px; align-items: center; gap: 10px; }
        .file-preview.active { display: flex; }
        .file-preview-name { flex: 1; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-preview-remove { background: #f85149; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .voice-bubble { display: flex; align-items: center; gap: 8px; }
        .voice-play { width: 32px; height: 32px; border-radius: 50%; border: none; background: #238636; color: #fff; cursor: pointer; font-size: 0.8rem; flex-shrink: 0; }
        .voice-play.played { background: #30363d; pointer-events: none; }
        .voice-meta { font-size: 0.75rem; color: #8b949e; }
        .toast-container { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .toast { background: #30363d; color: #e6edf3; padding: 8px 18px; border-radius: 16px; font-size: 0.8rem; animation: toastIn .25s ease; pointer-events: auto; white-space: nowrap; border: 1px solid #484f58; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 即时通讯</h1>
    </div>
    <div class="status-bar">
        <span class="status-indicator status-disconnected" id="statusIndicator"></span>
        <span id="statusText">未连接</span>
    </div>
    <div class="container">
        <div class="welcome-screen" id="welcomeScreen">
            <div id="nameSection">
                <p style="margin-bottom:10px;">设置你的昵称：</p>
                <input type="text" class="input-code" id="nameInput" maxlength="10" placeholder="请输入昵称" style="width:200px;">
                <p style="margin-top:20px;margin-bottom:10px;">设置消息焚毁时间（秒）：</p>
                <input type="number" class="input-code" id="burnTimeInput" value="8" min="3" max="60" style="width:100px;">
                <div style="margin-top:20px;display:flex;gap:10px;">
                    <button class="btn btn-primary" id="createBtn">创建房间</button>
                    <button class="btn" id="joinBtn">输入邀请码</button>
                </div>
            </div>
            <div id="inviteSection" style="display:none;">
                <p>分享此邀请码：</p>
                <div style="display:flex;align-items:center;gap:10px;margin:20px 0;">
                    <div class="invite-code-display" id="inviteCode">------</div>
                    <button class="btn" id="copyBtn" style="padding:8px 15px;">复制</button>
                </div>
                <p>等待对方加入...</p>
            </div>
            <div id="joinSection" style="display:none;">
                <p>输入邀请码：</p>
                <div style="display:flex;gap:10px;margin:20px 0;">
                    <input type="text" class="input-code" id="codeInput" maxlength="6" placeholder="______" style="width:150px;">
                    <button class="btn btn-primary" id="joinRoomBtn">加入</button>
                </div>
                <button class="btn" id="backBtn">返回</button>
            </div>
        </div>
        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <span>房间：<span id="roomCodeDisplay">------</span></span>
                <span>我：<span id="userNameDisplay">匿名</span></span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="file-preview" id="filePreview">
                <span class="file-preview-name" id="filePreviewName"></span>
                <button class="file-preview-remove" id="filePreviewRemove">×</button>
            </div>
            <div class="input-area">
                <input type="file" id="fileInput" style="display:none;" multiple>
                <button class="icon-btn" id="fileBtn" title="发送文件">📎</button>
                <button class="icon-btn" id="voiceBtn" title="按住录音">🎤</button>
                <textarea class="message-input" id="messageInput" rows="1" placeholder="输入消息..."></textarea>
                <button class="icon-btn send" id="sendBtn" title="发送">↑</button>
            </div>
            <p class="hint">消息将在 <span id="displayBurnTime">8</span> 秒后自动焚毁</p>
        </div>
    </div>
    <div class="disconnected-overlay" id="disconnectedOverlay">
        <h2>连接已断开</h2>
        <p>对方已离开或网络中断</p>
        <button class="btn" id="reloadBtn">重新开始</button>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        let peer = null;
        let conn = null;
        let isHost = false;
        let currentInviteCode = null;
        let userName = '匿名';
        let burnTime = 8;
        let fileDownloadExpiry = 60; // 文件下载有效期（秒）
        let pendingFile = null;
        let voiceRecorder = null;
        let voiceChunks = [];
        let voiceStream = null;
        let isRecording = false;
        let voiceStartTime = 0;

        function toast(msg) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function generateCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        function updateStatus(status, text) {
            document.getElementById('statusIndicator').className = 'status-indicator status-' + status;
            document.getElementById('statusText').textContent = text;
        }

        function showNameSection() {
            document.getElementById('nameSection').style.display = 'block';
            document.getElementById('inviteSection').style.display = 'none';
            document.getElementById('joinSection').style.display = 'none';
        }

        function showInviteSection() {
            document.getElementById('nameSection').style.display = 'none';
            document.getElementById('inviteSection').style.display = 'block';
            document.getElementById('joinSection').style.display = 'none';
        }

        function showJoinSection() {
            document.getElementById('nameSection').style.display = 'none';
            document.getElementById('inviteSection').style.display = 'none';
            document.getElementById('joinSection').style.display = 'block';
            document.getElementById('codeInput').focus();
        }

        function copyInviteCode() {
            const code = document.getElementById('inviteCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                toast('邀请码已复制！');
            }).catch(() => {
                const t = document.createElement('textarea');
                t.value = code;
                document.body.appendChild(t);
                t.select();
                document.execCommand('copy');
                document.body.removeChild(t);
                toast('邀请码已复制！');
            });
        }

        function createRoom() {
            userName = document.getElementById('nameInput').value.trim() || '匿名';
            burnTime = parseInt(document.getElementById('burnTimeInput').value) || 8;
            if (burnTime < 3) burnTime = 3;
            if (burnTime > 60) burnTime = 60;
            document.getElementById('displayBurnTime').textContent = burnTime;
            document.getElementById('userNameDisplay').textContent = userName;

            currentInviteCode = generateCode();
            document.getElementById('inviteCode').textContent = currentInviteCode;
            document.getElementById('roomCodeDisplay').textContent = currentInviteCode;

            showInviteSection();
            updateStatus('waiting', '等待连接...');

            peer = new Peer('burnafter-' + currentInviteCode, { debug: 0 });

            peer.on('connection', function(c) {
                conn = c;
                isHost = true;
                setupConnection();
            });

            peer.on('error', function(err) {
                toast('连接错误: ' + err.message);
                updateStatus('disconnected', '连接失败');
            });
        }

        function joinRoom() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            if (!code || code.length !== 6) {
                toast('请输入有效的6位邀请码');
                return;
            }

            userName = document.getElementById('nameInput').value.trim() || '匿名';
            burnTime = parseInt(document.getElementById('burnTimeInput').value) || 8;
            if (burnTime < 3) burnTime = 3;
            if (burnTime > 60) burnTime = 60;
            document.getElementById('displayBurnTime').textContent = burnTime;
            document.getElementById('userNameDisplay').textContent = userName;
            currentInviteCode = code;
            document.getElementById('roomCodeDisplay').textContent = code;

            updateStatus('waiting', '正在连接...');

            peer = new Peer({ debug: 0 });

            peer.on('open', function(id) {
                conn = peer.connect('burnafter-' + code);

                conn.on('open', function() {
                    isHost = false;
                    setupConnection();
                });

                conn.on('error', function(err) {
                    toast('连接失败: ' + err.message);
                    updateStatus('disconnected', '连接失败');
                });
            });

            peer.on('error', function(err) {
                toast('Peer错误: ' + err.message);
                updateStatus('disconnected', '连接失败');
            });
        }

        function setupConnection() {
            updateStatus('connected', '已连接');

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatScreen').classList.add('active');

            conn.on('data', function(data) {
                if (typeof data === 'object') {
                    if (data.type === 'message') {
                        showMessage(data.content, data.name, data.id, false);
                    } else if (data.type === 'file') {
                        receiveFile(data);
                    } else if (data.type === 'voice') {
                        showVoiceMessage(data, data.id, false);
                    } else if (data.type === 'burn') {
                        burnMessage(data.id);
                    }
                }
            });

            conn.on('close', function() {
                document.getElementById('disconnectedOverlay').classList.add('active');
                updateStatus('disconnected', '连接已断开');
            });
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        // 获取文件图标
        function getFileIcon(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📄', 'doc': '📝', 'docx': '📝', 'txt': '📃',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'bmp': '🖼️',
                'mp4': '🎬', 'avi': '🎬', 'mov': '🎬', 'mkv': '🎬',
                'mp3': '🎵', 'wav': '🎵', 'flac': '🎵',
                'zip': '📦', 'rar': '📦', '7z': '📦',
                'xls': '📊', 'xlsx': '📊',
                'ppt': '📽️', 'pptx': '📽️'
            };
            return icons[ext] || '📎';
        }

        // 显示文件消息
        function showFileMessage(fileData, senderName, msgId, isSent) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message ' + (isSent ? 'sent' : 'received') + ' file-message';
            messageEl.dataset.id = msgId;
            messageEl.dataset.fileId = fileData.fileId;
            messageEl.dataset.downloaded = 'false';

            const isImage = fileData.isImage || /\.(jpg|jpeg|png|gif|bmp|webp|svg)$/i.test(fileData.name);
            const icon = isImage ? '🖼️' : getFileIcon(fileData.name);
            const timerText = isSent ? '文件已发送' : `⏱️ 下载有效期：${fileData.expiry}秒`;

            messageEl.innerHTML = `
                <div class="file-info">
                    <span class="file-icon">${icon}</span>
                    <div class="file-details">
                        <div class="file-name">${fileData.name}</div>
                        <div class="file-size">${formatFileSize(fileData.size)}${isImage ? ' · 图片' : ''}</div>
                    </div>
                </div>
                <div class="file-timer">${timerText}</div>
                <button class="btn-download" data-file-id="${fileData.fileId}" ${isSent ? 'disabled style="background:#666;"' : ''}>
                    ${isSent ? '已发送' : (isImage ? '查看/下载图片' : '下载文件')}
                </button>
                <div class="file-status" id="status-${fileData.fileId}"></div>
            `;

            if (!isSent) {
                const downloadBtn = messageEl.querySelector('.btn-download');
                downloadBtn.addEventListener('click', function() {
                    downloadFile(fileData, msgId);
                });
            }

            document.getElementById('messages').appendChild(messageEl);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            if (!isSent) {
                playNotificationSound();
                startFileExpiryTimer(fileData.fileId, fileData.expiry, msgId);
            }

            // 消息焚毁倒计时
            setTimeout(() => {
                burnMessage(msgId);
            }, burnTime * 1000);
        }

        // 启动文件过期倒计时
        function startFileExpiryTimer(fileId, expiry, msgId) {
            let remaining = expiry;
            const statusEl = document.getElementById('status-' + fileId);

            const timer = setInterval(() => {
                remaining--;

                if (remaining <= 0) {
                    clearInterval(timer);
                    // 检查是否已下载
                    const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
                    if (msgEl && msgEl.dataset.downloaded !== 'true') {
                        statusEl.textContent = '链接已失效';
                        statusEl.className = 'file-status expired';
                        const btn = msgEl.querySelector('.btn-download');
                        if (btn) {
                            btn.disabled = true;
                            btn.textContent = '已失效';
                            btn.style.background = '#666';
                        }
                        const timerEl = msgEl.querySelector('.file-timer');
                        if (timerEl) timerEl.textContent = '⏱️ 下载有效期已过';
                    }
                } else {
                    const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
                    if (msgEl && msgEl.dataset.downloaded !== 'true') {
                        statusEl.textContent = `剩余 ${remaining} 秒`;
                    }
                }
            }, 1000);
        }

        // 发送文件 — 整个文件读为 dataURL，再分块传输字符串
        function sendFile(file) {
            if (!conn) { toast('请先建立连接！'); return; }

            const fileId = 'file-' + crypto.randomUUID();
            const isImage = file.type.startsWith('image/');

            const reader = new FileReader();
            reader.onload = function(e) {
                const fullDataUrl = e.target.result;
                const chunkSize = 14 * 1024; // 14KB 每块，安全适配 DataChannel
                const totalChunks = Math.ceil(fullDataUrl.length / chunkSize);

                const fileData = {
                    type: 'file', fileId: fileId, name: file.name,
                    size: file.size, expiry: fileDownloadExpiry,
                    totalChunks: totalChunks, mime: file.type, isImage: isImage
                };

                showFileMessage(fileData, userName, fileId, true);

                // 发送元数据
                conn.send(fileData);

                // 发送所有分块
                for (let i = 0; i < totalChunks; i++) {
                    conn.send({
                        type: 'file-chunk', fileId: fileId,
                        chunkIndex: i, totalChunks: totalChunks,
                        data: fullDataUrl.substring(i * chunkSize, (i + 1) * chunkSize)
                    });
                }

                // 更新发送状态
                setTimeout(() => {
                    const statusEl = document.getElementById('status-' + fileId);
                    if (statusEl) { statusEl.textContent = '已发送完毕'; statusEl.className = 'file-status downloaded'; }
                    // 图片：发送方也显示预览
                    if (isImage) {
                        const msgEl = document.querySelector('[data-id="' + fileId + '"]');
                        if (msgEl) addImagePreview(msgEl, fullDataUrl);
                    }
                }, 300);
            };
            reader.readAsDataURL(file);
        }

        // 接收文件块
        const receivedFileChunks = {};

        function receiveFile(data) {
            if (data.type === 'file') {
                receivedFileChunks[data.fileId] = {
                    name: data.name, size: data.size, expiry: data.expiry,
                    mime: data.mime, isImage: data.isImage,
                    chunks: [], totalChunks: data.totalChunks, received: 0
                };
                showFileMessage(data, data.name, data.fileId, false);
            } else if (data.type === 'file-chunk') {
                const fileId = data.fileId;
                if (!receivedFileChunks[fileId]) return;

                const f = receivedFileChunks[fileId];
                f.chunks[data.chunkIndex] = data.data;
                f.received++;

                const progress = Math.round((f.received / data.totalChunks) * 100);
                const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
                const statusEl = document.getElementById('status-' + fileId);
                if (statusEl) statusEl.textContent = '接收中... ' + progress + '%';

                if (f.received === f.totalChunks) {
                    // 拼回完整 dataURL
                    const fullDataUrl = f.chunks.join('');
                    const blob = dataURLToBlob(fullDataUrl);

                    window['receivedFile_' + fileId] = { blob: blob, name: f.name, dataUrl: fullDataUrl, isImage: f.isImage };

                    if (statusEl) { statusEl.textContent = '已接收，可下载'; statusEl.className = 'file-status downloaded'; }

                    // 图片：显示内联预览
                    if (f.isImage && msgEl) {
                        addImagePreview(msgEl, fullDataUrl);
                    }
                }
            }
        }

        // dataURL 转 Blob
        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const bytes = atob(parts[1]);
            const arr = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            return new Blob([arr], { type: mime });
        }

        // 图片内联预览
        function addImagePreview(msgEl, dataUrl) {
            const existing = msgEl.querySelector('.file-preview-img');
            if (existing) return;
            const img = document.createElement('img');
            img.className = 'file-preview-img';
            img.src = dataUrl;
            img.style.cssText = 'max-width:100%;max-height:220px;border-radius:10px;margin-top:8px;cursor:pointer;display:block;';
            img.addEventListener('click', () => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer;';
                overlay.innerHTML = '<img src="' + dataUrl + '" style="max-width:95%;max-height:95%;border-radius:10px;">';
                overlay.addEventListener('click', () => overlay.remove());
                document.body.appendChild(overlay);
            });
            msgEl.appendChild(img);
        }

        // 下载文件
        function downloadFile(fileData, msgId) {
            const fileId = fileData.fileId;
            const receivedFile = window['receivedFile_' + fileId];

            if (!receivedFile) {
                toast('文件尚未接收完成，请稍候');
                return;
            }

            // 检查是否已下载过
            const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
            if (msgEl && msgEl.dataset.downloaded === 'true') {
                toast('此文件已下载过，链接已失效');
                return;
            }

            // 创建下载链接
            const url = URL.createObjectURL(receivedFile.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = receivedFile.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // 标记为已下载
            if (msgEl) {
                msgEl.dataset.downloaded = 'true';
                const statusEl = document.getElementById('status-' + fileId);
                statusEl.textContent = '已下载';
                statusEl.className = 'file-status downloaded';
                const btn = msgEl.querySelector('.btn-download');
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = '已下载';
                    btn.style.background = '#666';
                }
                const timerEl = msgEl.querySelector('.file-timer');
                if (timerEl) timerEl.textContent = '✓ 文件已保存';
            }

            // 清理内存
            delete window['receivedFile_' + fileId];
        }

        function showMessage(content, senderName, msgId, isSent) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message ' + (isSent ? 'sent' : 'received');
            messageEl.dataset.id = msgId;

            messageEl.innerHTML = `
                <div style="font-size:0.8rem;opacity:0.8;margin-bottom:5px;">${senderName}</div>
                <div>${content}</div>
                <div class="message-time">${new Date().toLocaleTimeString()}</div>
            `;

            document.getElementById('messages').appendChild(messageEl);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            if (!isSent) {
                playNotificationSound();
            }

            setTimeout(() => {
                burnMessage(msgId);
            }, burnTime * 1000);
        }

        function burnMessage(msgId) {
            const msgEl = document.querySelector('[data-id="' + msgId + '"]');
            if (msgEl) {
                msgEl.style.opacity = '0';
                msgEl.style.transform = 'scale(0.8)';
                msgEl.style.transition = 'all 0.5s ease';
                setTimeout(() => {
                    msgEl.remove();
                }, 500);

                if (conn && conn.open) {
                    conn.send({ type: 'burn', id: msgId });
                }
            }
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value.trim();
            if (!content) return;

            const msgId = crypto.randomUUID();
            showMessage(content, userName, msgId, true);

            if (conn) {
                conn.send({
                    type: 'message',
                    content: content,
                    name: userName,
                    id: msgId,
                    burnTime: burnTime
                });
            }

            document.getElementById('messageInput').value = '';
        }

        // ===== 语音消息 =====
        async function startVoiceRecord() {
            if (!conn || !conn.open) { toast('请先建立连接'); return; }
            try {
                voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
                voiceRecorder = new MediaRecorder(voiceStream, { mimeType: mime });
                voiceChunks = [];
                voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data); };
                voiceRecorder.start();
                isRecording = true;
                voiceStartTime = Date.now();
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('voiceBtn').textContent = '⬤';
            } catch(e) {
                toast('无法访问麦克风');
                isRecording = false;
            }
        }

        async function stopVoiceRecord() {
            if (!isRecording || !voiceRecorder) return;
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('voiceBtn').textContent = '🎤';
            const btn = document.getElementById('voiceBtn');
            return new Promise(resolve => {
                voiceRecorder.onstop = async () => {
                    if (voiceStream) { voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null; }
                    const blob = new Blob(voiceChunks, { type: voiceRecorder.mimeType });
                    voiceRecorder = null; voiceChunks = [];
                    resolve(blob);
                };
                voiceRecorder.stop();
            });
        }

        function sendVoice(blob) {
            if (!blob || blob.size < 100) return;
            const reader = new FileReader();
            reader.onload = function() {
                const msgId = crypto.randomUUID();
                const duration = Math.max(1, Math.round((Date.now() - voiceStartTime) / 1000));
                const voiceData = {
                    type: 'voice', id: msgId, name: userName,
                    data: reader.result, duration: Math.min(duration, 60),
                    mime: blob.type, timestamp: Date.now()
                };
                showVoiceMessage(voiceData, msgId, true);
                conn.send(voiceData);
            };
            reader.readAsDataURL(blob);
        }

        function showVoiceMessage(data, msgId, isSent) {
            const el = document.createElement('div');
            el.className = 'message ' + (isSent ? 'sent' : 'received') + ' voice-message';
            el.dataset.id = msgId;
            el.innerHTML = `
                <div class="message-sender">${data.name}</div>
                <div class="voice-bubble">
                    <button class="voice-play" data-voice-id="${msgId}">▶</button>
                    <span class="voice-meta">🎤 ${data.duration || '?'}″</span>
                </div>
                <div class="message-time">${new Date(data.timestamp).toLocaleTimeString()}</div>
            `;
            document.getElementById('messages').appendChild(el);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            setupVoicePlay(el, data.data, data.mime);
            if (!isSent) playNotificationSound();
            setTimeout(() => burnMessage(msgId), burnTime * 1000);
        }

        function setupVoicePlay(el, dataUrl, mime) {
            const btn = el.querySelector('.voice-play');
            if (!btn) return;
            const audio = new Audio(dataUrl);
            btn.addEventListener('click', () => {
                if (btn.classList.contains('played')) return;
                btn.classList.add('played');
                btn.textContent = '⏸';
                audio.play().catch(() => {});
                audio.onended = () => { btn.textContent = '✓'; };
            });
        }

        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // 文件选择处理
        document.getElementById('fileBtn').addEventListener('click', function() {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // 显示文件预览
                const preview = document.getElementById('filePreview');
                const previewName = document.getElementById('filePreviewName');
                preview.classList.add('active');
                previewName.textContent = '📎 ' + file.name + ' (' + formatFileSize(file.size) + ')';
                pendingFile = file;
            }
        });

        document.getElementById('filePreviewRemove').addEventListener('click', function() {
            document.getElementById('filePreview').classList.remove('active');
            document.getElementById('fileInput').value = '';
            pendingFile = null;
        });

        // 绑定事件
        document.getElementById('createBtn').addEventListener('click', createRoom);
        document.getElementById('joinBtn').addEventListener('click', showJoinSection);
        document.getElementById('copyBtn').addEventListener('click', copyInviteCode);
        document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
        document.getElementById('backBtn').addEventListener('click', showNameSection);
        document.getElementById('sendBtn').addEventListener('click', function() {
            // 优先发送文件
            if (pendingFile) {
                sendFile(pendingFile);
                document.getElementById('filePreview').classList.remove('active');
                document.getElementById('fileInput').value = '';
                pendingFile = null;
            } else {
                sendMessage();
            }
        });
        document.getElementById('reloadBtn').addEventListener('click', function() { location.reload(); });

        // 语音按钮：按住录音，松开发送
        const voiceBtn = document.getElementById('voiceBtn');
        let voiceLongPress;

        voiceBtn.addEventListener('mousedown', e => { e.preventDefault(); voiceLongPress = setTimeout(() => startVoiceRecord(), 200); });
        voiceBtn.addEventListener('mouseup', async e => { e.preventDefault(); clearTimeout(voiceLongPress); const blob = await stopVoiceRecord(); if (blob) sendVoice(blob); });
        voiceBtn.addEventListener('mouseleave', () => { clearTimeout(voiceLongPress); if (isRecording) { voiceRecorder.onstop = () => {}; voiceRecorder.stop(); if (voiceStream) { voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null; } voiceRecorder = null; isRecording = false; document.getElementById('voiceBtn').classList.remove('recording'); document.getElementById('voiceBtn').textContent = '🎤'; } });
        voiceBtn.addEventListener('touchstart', e => { e.preventDefault(); voiceLongPress = setTimeout(() => startVoiceRecord(), 200); });
        voiceBtn.addEventListener('touchend', async e => { e.preventDefault(); clearTimeout(voiceLongPress); const blob = await stopVoiceRecord(); if (blob) sendVoice(blob); });
        voiceBtn.addEventListener('touchcancel', () => { clearTimeout(voiceLongPress); if (isRecording) { voiceRecorder.onstop = () => {}; voiceRecorder.stop(); if (voiceStream) { voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null; } voiceRecorder = null; isRecording = false; document.getElementById('voiceBtn').classList.remove('recording'); document.getElementById('voiceBtn').textContent = '🎤'; } });

        document.getElementById('messageInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (pendingFile) {
                    sendFile(pendingFile);
                    document.getElementById('filePreview').classList.remove('active');
                    document.getElementById('fileInput').value = '';
                    pendingFile = null;
                } else {
                    sendMessage();
                }
            }
        });

        document.getElementById('codeInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                joinRoom();
            }
        });
    </script>
</body>
</html>
