<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即时通讯</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e13;
            --surface: #111920;
            --surface2: #19202a;
            --border: #212830;
            --text: #c0c8d4;
            --text-dim: #6e7681;
            --accent: #58a6ff;
            --green: #238636;
            --green-bubble: #1a6b30;
            --red: #f85149;
            --orange: #d2991d;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh; display: flex; flex-direction: column;
            overflow: hidden; -webkit-tap-highlight-color: transparent;
            /* 细微网格背景 */
            background-image:
                linear-gradient(rgba(88,166,255,.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88,166,255,.015) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* === 头部 === */
        .header {
            background: var(--surface); padding: 14px 16px;
            text-align: center; flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(0,0,0,.25);
            position: relative; z-index: 2;
        }
        .header h1 {
            font-size: 1.05rem; font-weight: 600; color: var(--accent);
            letter-spacing: 2px;
        }

        /* === 状态栏 === */
        .status-bar {
            background: var(--surface); padding: 7px 14px;
            text-align: center; font-size: 0.73rem; color: var(--text-dim);
            flex-shrink: 0; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .status-indicator {
            display: inline-block; width: 7px; height: 7px; border-radius: 50%;
        }
        .status-waiting { background: var(--orange); animation: pulse 1.5s infinite; }
        .status-connected { background: #3fb950; }
        .status-disconnected { background: var(--red); }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(210,153,29,.5); }
            50%    { box-shadow: 0 0 0 8px rgba(210,153,29,0); }
        }

        /* === 广告位通用 === */
        .ad-slot {
            flex-shrink: 0; display: none;
            align-items: center; justify-content: center;
            background: var(--surface2); border: 1px dashed var(--border);
            border-radius: 6px; color: var(--text-dim); font-size: 0.7rem;
            letter-spacing: 1px; overflow: hidden;
        }
        .ad-slot.active { display: flex; }

        .ad-banner-top, .ad-banner-bottom {
            min-height: 50px; margin: 0;
        }
        @media (min-width: 768px) {
            .ad-banner-top, .ad-banner-bottom { min-height: 90px; }
        }

        .ad-interstitial {
            width: 100%; max-width: 320px; min-height: 250px;
            margin: 12px auto; border-radius: 10px;
        }

        /* === 主容器 === */
        .container {
            flex: 1; max-width: 600px; margin: 0 auto; width: 100%;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* === 欢迎页 === */
        .welcome-screen {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 14px; padding: 20px;
        }
        .welcome-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 28px 24px;
            width: 100%; max-width: 380px; box-shadow: var(--shadow);
            text-align: center;
        }
        .welcome-card label {
            font-size: 0.82rem; color: var(--text-dim);
            display: block; margin-bottom: 6px;
        }
        .welcome-card .section-title {
            font-size: 0.85rem; color: var(--text-dim);
            margin: 20px 0 8px;
        }

        .btn {
            border: 1px solid var(--border); padding: 11px 28px;
            font-size: 0.9rem; cursor: pointer; border-radius: 8px;
            transition: all .15s; font-family: inherit;
            font-weight: 500; background: var(--surface2); color: var(--text);
        }
        .btn:hover { border-color: #30363d; }
        .btn:active { transform: scale(.97); opacity: .85; }
        .btn-primary { background: var(--green); border-color: #2ea043; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-primary:active { background: #238636; }
        .btn-sm { padding: 7px 14px; font-size: 0.8rem; border-radius: 6px; }

        .input-code {
            padding: 10px 14px; font-size: 0.95rem; border: 1px solid var(--border);
            border-radius: 8px; background: var(--bg); color: var(--text);
            text-align: center; outline: none; font-family: inherit;
            transition: border-color .2s;
        }
        .input-code:focus { border-color: var(--accent); }

        .invite-code-display {
            font-size: 2.2rem; font-weight: 700; color: var(--accent);
            letter-spacing: 8px; font-family: 'SF Mono', 'Cascadia Code', monospace;
            background: var(--bg); padding: 10px 20px; border-radius: 10px;
            border: 1px solid var(--border); user-select: all;
        }

        /* === 聊天区 === */
        .chat-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .chat-screen.active { display: flex; }

        .chat-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
            font-size: 0.82rem;
        }
        .chat-header .code-label { color: var(--accent); font-weight: 600; }

        /* === 消息容器（网格纹理） === */
        .messages {
            flex: 1; overflow-y: auto; padding: 10px 12px;
            display: flex; flex-direction: column; gap: 6px;
            -webkit-overflow-scrolling: touch;
            background-image:
                linear-gradient(rgba(255,255,255,.008) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.008) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* === 聊天气泡 === */
        .message {
            padding: 10px 14px; border-radius: 18px; max-width: 78%;
            word-break: break-word; font-size: 0.88rem; line-height: 1.5;
            position: relative;
            animation: msgIn .3s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.sent {
            background: linear-gradient(135deg, #1a7f37, #176b2e);
            color: #e6edf3; align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .message.received {
            background: var(--surface2); color: var(--text);
            align-self: flex-start; border-bottom-left-radius: 6px;
            border: 1px solid var(--border);
        }
        .message.file-message {
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px 14px; max-width: 82%;
        }
        .message.voice-message {
            background: var(--surface2); border: 1px solid var(--border);
        }

        .message.burning {
            opacity: 0; transform: scale(0.85);
            transition: all .4s ease;
            pointer-events: none;
        }

        .message-sender {
            font-size: 0.7rem; opacity: 0.6; margin-bottom: 3px;
            font-weight: 500;
        }
        .message-time {
            font-size: 0.62rem; opacity: 0.45; margin-top: 5px;
            text-align: right;
        }

        /* === 文件消息 === */
        .btn-download {
            background: var(--orange); border-color: var(--orange);
            color: #000; padding: 7px 16px; font-size: 0.78rem;
            border-radius: 6px; border: none; cursor: pointer;
            font-weight: 600; font-family: inherit; margin-top: 6px;
        }
        .btn-download:disabled { opacity: .35; cursor: not-allowed; }

        .file-info { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .file-icon { font-size: 1.8rem; }
        .file-details { flex: 1; min-width: 0; }
        .file-name { font-weight: 600; font-size: 0.83rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { font-size: 0.72rem; opacity: 0.6; }
        .file-timer { font-size: 0.75rem; color: var(--orange); margin: 4px 0; }
        .file-status { font-size: 0.72rem; margin-top: 4px; }
        .file-status.expired { color: var(--red); }
        .file-status.downloaded { color: #3fb950; }

        .file-preview-img {
            max-width: 100%; max-height: 200px; border-radius: 10px;
            margin-top: 8px; cursor: pointer; display: block;
            border: 1px solid var(--border);
        }

        /* === 语音消息 === */
        .voice-bubble { display: flex; align-items: center; gap: 10px; }
        .voice-play {
            width: 34px; height: 34px; border-radius: 50%; border: none;
            background: var(--green); color: #fff; cursor: pointer;
            font-size: 0.85rem; flex-shrink: 0;
            transition: transform .15s;
        }
        .voice-play:active { transform: scale(.9); }
        .voice-play.played { background: var(--surface2); border: 1px solid var(--border); pointer-events: none; }
        .voice-meta { font-size: 0.75rem; color: var(--text-dim); }

        /* === 输入区 === */
        .input-area {
            display: flex; gap: 5px; padding: 8px 10px; align-items: flex-end;
            background: var(--surface); border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .message-input {
            flex: 1; padding: 9px 14px; border: 1px solid var(--border);
            border-radius: 22px; background: var(--bg); color: var(--text);
            resize: none; font-size: 0.88rem; outline: none;
            font-family: inherit; max-height: 90px; line-height: 1.4;
            transition: border-color .2s;
        }
        .message-input:focus { border-color: var(--accent); }

        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--surface2);
            color: var(--text); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all .12s;
        }
        .icon-btn:active { background: #30363d; transform: scale(.9); }
        .icon-btn.send { background: var(--green); border-color: #2ea043; color: #fff; }
        .icon-btn.send:active { background: #2ea043; }
        .icon-btn.recording {
            background: var(--red); border-color: var(--red); color: #fff;
            animation: recPulse .6s infinite;
        }
        @keyframes recPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(248,81,73,.6); }
            50%    { box-shadow: 0 0 0 12px rgba(248,81,73,0); }
        }

        .hint {
            text-align: center; color: var(--text-dim); font-size: 0.7rem;
            padding: 5px; flex-shrink: 0; background: var(--surface);
        }

        /* === 文件预览条 === */
        .file-preview {
            display: none; background: var(--surface2); border-top: 1px solid var(--border);
            padding: 8px 14px; align-items: center; gap: 10px;
        }
        .file-preview.active { display: flex; }
        .file-preview-name {
            flex: 1; font-size: 0.78rem; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .file-preview-remove {
            background: var(--red); color: #fff; border: none;
            padding: 4px 10px; border-radius: 4px; cursor: pointer;
            font-size: 0.8rem;
        }

        /* === 断开连接遮罩 === */
        .disconnected-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.94); flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .disconnected-overlay.active { display: flex; }
        .disconnected-overlay h2 { color: var(--red); font-size: 1.3rem; margin-bottom: 8px; }
        .disconnected-overlay p { color: var(--text-dim); margin-bottom: 20px; font-size: 0.85rem; }

        /* === Toast === */
        .toast-container {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 999; display: flex; flex-direction: column; gap: 6px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface2); color: var(--text);
            padding: 9px 20px; border-radius: 20px; font-size: 0.8rem;
            animation: toastIn .25s ease; pointer-events: auto;
            white-space: nowrap; border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* === 滚动条 === */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 即时通讯</h1>
    </div>
    <div class="status-bar">
        <span class="status-indicator status-disconnected" id="statusIndicator"></span>
        <span id="statusText">未连接</span>
    </div>
    <!-- 顶部横幅广告位 -->
    <div class="ad-slot ad-banner-top" id="adBannerTop">广告位 — 顶部横幅</div>
    <div class="container">
        <div class="welcome-screen" id="welcomeScreen">
            <div id="nameSection">
                <div class="welcome-card">
                    <label>设置你的昵称</label>
                    <input type="text" class="input-code" id="nameInput" maxlength="10" placeholder="请输入昵称" style="width:100%;">
                    <p class="section-title">消息焚毁时间（秒）</p>
                    <input type="number" class="input-code" id="burnTimeInput" value="8" min="3" max="60" style="width:100%;">
                    <div style="margin-top:22px;display:flex;gap:10px;justify-content:center;">
                        <button class="btn btn-primary" id="createBtn">创建房间</button>
                        <button class="btn" id="joinBtn">输入邀请码</button>
                    </div>
                </div>
                <!-- 插屏广告位 -->
                <div class="ad-slot ad-interstitial" id="adInterstitial">广告位 — 插屏</div>
            </div>
            <div id="inviteSection" style="display:none;">
                <div class="welcome-card">
                    <label>分享此邀请码</label>
                    <div style="display:flex;align-items:center;gap:10px;margin:16px 0;">
                        <div class="invite-code-display" id="inviteCode">------</div>
                        <button class="btn btn-sm" id="copyBtn">复制</button>
                    </div>
                    <p style="color:var(--text-dim);font-size:0.8rem;">等待对方加入...</p>
                </div>
                <!-- 插屏广告位 -->
                <div class="ad-slot ad-interstitial" id="adInterstitial2">广告位 — 插屏</div>
            </div>
            <div id="joinSection" style="display:none;">
                <div class="welcome-card">
                    <label>输入邀请码</label>
                    <div style="display:flex;gap:10px;margin:16px 0;justify-content:center;">
                        <input type="text" class="input-code" id="codeInput" maxlength="6" placeholder="______" style="width:140px;">
                        <button class="btn btn-primary" id="joinRoomBtn">加入</button>
                    </div>
                    <button class="btn btn-sm" id="backBtn">返回</button>
                </div>
                <!-- 插屏广告位 -->
                <div class="ad-slot ad-interstitial" id="adInterstitial3">广告位 — 插屏</div>
            </div>
        </div>
        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <span>房间：<span id="roomCodeDisplay">------</span></span>
                <span>我：<span id="userNameDisplay">匿名</span></span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="file-preview" id="filePreview">
                <span class="file-preview-name" id="filePreviewName"></span>
                <button class="file-preview-remove" id="filePreviewRemove">×</button>
            </div>
            <!-- 底部横幅广告位 -->
            <div class="ad-slot ad-banner-bottom" id="adBannerBottom">广告位 — 底部横幅</div>
            <div class="input-area">
                <input type="file" id="fileInput" style="display:none;" multiple>
                <button class="icon-btn" id="fileBtn" title="发送文件">📎</button>
                <button class="icon-btn" id="voiceBtn" title="按住录音">🎤</button>
                <textarea class="message-input" id="messageInput" rows="1" placeholder="输入消息..."></textarea>
                <button class="icon-btn send" id="sendBtn" title="发送">↑</button>
            </div>
            <p class="hint">消息将在 <span id="displayBurnTime">8</span> 秒后自动焚毁</p>
        </div>
    </div>
    <div class="disconnected-overlay" id="disconnectedOverlay">
        <h2>连接已断开</h2>
        <p>对方已离开或网络中断</p>
        <button class="btn" id="reloadBtn">重新开始</button>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        let peer = null;
        let conn = null;
        let isHost = false;
        let currentInviteCode = null;
        let userName = '匿名';
        let burnTime = 8;
        let fileDownloadExpiry = 60; // 文件下载有效期（秒）
        let pendingFile = null;
        let voiceRecorder = null;
        let voiceChunks = [];
        let voiceStream = null;
        let isRecording = false;
        let voiceStartTime = 0;

        // ICE 服务器配置（STUN 用于 P2P 穿透，TURN 用于移动网络对称 NAT 中继）
        const ICE_CONFIG = {
            iceServers: [
                { urls: 'stun:stun.miwifi.com:3478' },
                { urls: 'stun:stun.qq.com:3478' },
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:80?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
            ],
            iceCandidatePoolSize: 2
        };

        // 广告位开关（设为 true 启用对应广告位，日后替换为真实广告代码）
        const AD_CONFIG = {
            bannerTop: false,
            bannerBottom: false,
            interstitial: false
        };

        function syncAdSlots() {
            const top = document.getElementById('adBannerTop');
            const bottom = document.getElementById('adBannerBottom');
            const inters = document.querySelectorAll('.ad-interstitial');
            if (top) top.classList.toggle('active', AD_CONFIG.bannerTop);
            if (bottom) bottom.classList.toggle('active', AD_CONFIG.bannerBottom);
            inters.forEach(el => el.classList.toggle('active', AD_CONFIG.interstitial));
        }
        syncAdSlots(); // 页面加载时同步一次

        function toast(msg) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function generateCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        function updateStatus(status, text) {
            document.getElementById('statusIndicator').className = 'status-indicator status-' + status;
            document.getElementById('statusText').textContent = text;
        }

        function showNameSection() {
            document.getElementById('nameSection').style.display = 'block';
            document.getElementById('inviteSection').style.display = 'none';
            document.getElementById('joinSection').style.display = 'none';
        }

        function showInviteSection() {
            document.getElementById('nameSection').style.display = 'none';
            document.getElementById('inviteSection').style.display = 'block';
            document.getElementById('joinSection').style.display = 'none';
        }

        function showJoinSection() {
            document.getElementById('nameSection').style.display = 'none';
            document.getElementById('inviteSection').style.display = 'none';
            document.getElementById('joinSection').style.display = 'block';
            document.getElementById('codeInput').focus();
        }

        function copyInviteCode() {
            const code = document.getElementById('inviteCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                toast('邀请码已复制！');
            }).catch(() => {
                const t = document.createElement('textarea');
                t.value = code;
                document.body.appendChild(t);
                t.select();
                document.execCommand('copy');
                document.body.removeChild(t);
                toast('邀请码已复制！');
            });
        }

        function createRoom() {
            userName = document.getElementById('nameInput').value.trim() || '匿名';
            burnTime = parseInt(document.getElementById('burnTimeInput').value) || 8;
            if (burnTime < 3) burnTime = 3;
            if (burnTime > 60) burnTime = 60;
            document.getElementById('displayBurnTime').textContent = burnTime;
            document.getElementById('userNameDisplay').textContent = userName;

            isHost = true;
            currentInviteCode = generateCode();
            document.getElementById('inviteCode').textContent = currentInviteCode;
            document.getElementById('roomCodeDisplay').textContent = currentInviteCode;

            showInviteSection();
            updateStatus('waiting', '等待连接...');
            startConnectionTimer();

            peer = new Peer('burnafter-' + currentInviteCode, { debug: 0, config: ICE_CONFIG });

            peer.on('connection', function(c) {
                conn = c;
                isHost = true;
                c.on('open', function() {
                    setupConnection();
                });
            });

            peer.on('error', function(err) {
                toast('连接错误: ' + err.message);
                updateStatus('disconnected', '连接失败');
            });
        }

        function joinRoom() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            if (!code || code.length !== 6) {
                toast('请输入有效的6位邀请码');
                return;
            }

            isHost = false;
            userName = document.getElementById('nameInput').value.trim() || '匿名';
            burnTime = parseInt(document.getElementById('burnTimeInput').value) || 8;
            if (burnTime < 3) burnTime = 3;
            if (burnTime > 60) burnTime = 60;
            document.getElementById('displayBurnTime').textContent = burnTime;
            document.getElementById('userNameDisplay').textContent = userName;
            currentInviteCode = code;
            document.getElementById('roomCodeDisplay').textContent = code;

            updateStatus('waiting', '正在连接...');
            startConnectionTimer();

            peer = new Peer({ debug: 0, config: ICE_CONFIG });

            peer.on('open', function(id) {
                conn = peer.connect('burnafter-' + code);

                conn.on('open', function() {
                    isHost = false;
                    setupConnection();
                });

                conn.on('error', function(err) {
                    toast('连接失败: ' + err.message);
                    updateStatus('disconnected', '连接失败');
                });
            });

            peer.on('error', function(err) {

        function setupConnection() {

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        // 获取文件图标
        function getFileIcon(fileName) {

                'mp4': '🎬', 'avi': '🎬', 'mov': '🎬', 'mkv': '🎬',

        // 启动文件过期倒计时
        function startFileExpiryTimer(fileId, expiry, msgId) {
            let remaining = expiry;
            const statusEl = document.getElementById('status-' + fileId);

            const timer = setInterval(() => {
                remaining--;

                if (remaining <= 0) {
                    clearInterval(timer);

                    const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');

                    }
                }
            }, 1000);

        // 图片压缩 — Canvas 缩放到 MAX 尺寸内，输出 JPEG quality 0.75
        function compressImage(file) {
            const MAX = 1920;
            const QUALITY = 0.75;
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = function() {
                    let w = img.width, h = img.height;
                    if (w > MAX || h > MAX) {
                        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                        else { w = Math.round(w * MAX / h); h = MAX; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(function(blob) {
                        const reader = new FileReader();
                        reader.onload = function(e) { resolve({ dataUrl: e.target.result, blob: blob }); };
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    }, 'image/jpeg', QUALITY);
                };
                img.onerror = reject;
                img.src = URL.createObjectURL(file);
            });
        }

        // 发送文件 — 图片先压缩，再分块传输
        async function sendFile(file) {
            if (!conn) { toast('请先建立连接！'); return; }

            const fileId = 'file-' + crypto.randomUUID();
            const isImage = file.type.startsWith('image/');
            let fullDataUrl, sendName, sendMime, sendSize;

            if (isImage) {
                try {
                    const compressed = await compressImage(file);
                    fullDataUrl = compressed.dataUrl;
                    sendName = file.name.replace(/\.[^.]+$/, '') + '.jpg';
                    sendMime = 'image/jpeg';
                    sendSize = compressed.blob.size;
                    if (compressed.blob.size < file.size) {
                        toast('图片已压缩: ' + formatFileSize(file.size) + ' → ' + formatFileSize(compressed.blob.size));
                    }
                } catch(e) {
                    // 压缩失败，直接读原文件
                    const result = await new Promise(resolve => {
                        const r = new FileReader();
                        r.onload = e => resolve(e.target.result);
                        r.readAsDataURL(file);
                    });
                    fullDataUrl = result;
                    sendName = file.name;
                    sendMime = file.type;
                    sendSize = file.size;
                }
            } else {
                const result = await new Promise(resolve => {
                    const r = new FileReader();
                    r.onload = e => resolve(e.target.result);
                    r.readAsDataURL(file);
                });
                fullDataUrl = result;
                sendName = file.name;
                sendMime = file.type;
                sendSize = file.size;
            }

            const chunkSize = 14 * 1024;
            const totalChunks = Math.ceil(fullDataUrl.length / chunkSize);

            const fileData = {
                type: 'file', fileId: fileId, name: sendName,
                size: sendSize, expiry: fileDownloadExpiry,
                totalChunks: totalChunks, mime: sendMime, isImage: isImage
            };

            showFileMessage(fileData, userName, fileId, true);

            conn.send(fileData);

            for (let i = 0; i < totalChunks; i++) {
                conn.send({
                    type: 'file-chunk', fileId: fileId,
                    chunkIndex: i, totalChunks: totalChunks,
                    data: fullDataUrl.substring(i * chunkSize, (i + 1) * chunkSize)
                });
            }

            // 更新发送状态
            setTimeout(() => {
                const statusEl = document.getElementById('status-' + fileId);
                if (statusEl) { statusEl.textContent = '已发送完毕'; statusEl.className = 'file-status downloaded'; }
                if (isImage) {
                    const msgEl = document.querySelector('[data-id="' + fileId + '"]');
                    if (msgEl) addImagePreview(msgEl, fullDataUrl);
                }
            }, 300);
        }

        // 接收文件块
        const receivedFileChunks = {};

        function receiveFile(data) {
            if (data.type === 'file') {
                receivedFileChunks[data.fileId] = {
                    name: data.name, size: data.size, expiry: data.expiry,
                    mime: data.mime, isImage: data.isImage,
                    chunks: [], totalChunks: data.totalChunks, received: 0
                };
                showFileMessage(data, data.name, data.fileId, false);
            } else if (data.type === 'file-chunk') {
                const fileId = data.fileId;
                if (!receivedFileChunks[fileId]) return;

                const f = receivedFileChunks[fileId];
                f.chunks[data.chunkIndex] = data.data;
                f.received++;

                const progress = Math.round((f.received / data.totalChunks) * 100);
                const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
                const statusEl = document.getElementById('status-' + fileId);
                if (statusEl) statusEl.textContent = '接收中... ' + progress + '%';

                if (f.received === f.totalChunks) {
                    // 拼回完整 dataURL
                    const fullDataUrl = f.chunks.join('');
                    const blob = dataURLToBlob(fullDataUrl);

                    window['receivedFile_' + fileId] = { blob: blob, name: f.name, dataUrl: fullDataUrl, isImage: f.isImage };

                    if (statusEl) { statusEl.textContent = '已接收，可下载'; statusEl.className = 'file-status downloaded'; }

                    // 图片：显示内联预览
                    if (f.isImage && msgEl) {
                        addImagePreview(msgEl, fullDataUrl);
                    }
                }
            }
        }

        // dataURL 转 Blob
        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const bytes = atob(parts[1]);
            const arr = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            return new Blob([arr], { type: mime });
        }

        // 图片内联预览
        function addImagePreview(msgEl, dataUrl) {
            const existing = msgEl.querySelector('.file-preview-img');
            if (existing) return;
            const img = document.createElement('img');
            img.className = 'file-preview-img';
            img.src = dataUrl;
            img.style.cssText = 'max-width:100%;max-height:220px;border-radius:10px;margin-top:8px;cursor:pointer;display:block;';
            img.addEventListener('click', () => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;cursor:pointer;';
                overlay.innerHTML = '<img src="' + dataUrl + '" style="max-width:95%;max-height:95%;border-radius:10px;">';
                overlay.addEventListener('click', () => overlay.remove());
                document.body.appendChild(overlay);
            });
            msgEl.appendChild(img);
        }

        // 下载文件
        function downloadFile(fileData, msgId) {
            const fileId = fileData.fileId;
            const receivedFile = window['receivedFile_' + fileId];

            if (!receivedFile) {
                toast('文件尚未接收完成，请稍候');
                return;
            }

            // 检查是否已下载过
            const msgEl = document.querySelector('[data-file-id="' + fileId + '"]');
            if (msgEl && msgEl.dataset.downloaded === 'true') {
                toast('此文件已下载过，链接已失效');
                return;
            }

            // 创建下载链接
            const url = URL.createObjectURL(receivedFile.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = receivedFile.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // 标记为已下载
            if (msgEl) {
                msgEl.dataset.downloaded = 'true';
                const statusEl = document.getElementById('status-' + fileId);
                statusEl.textContent = '已下载';
                statusEl.className = 'file-status downloaded';
                const btn = msgEl.querySelector('.btn-download');
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = '已下载';
                    btn.style.background = '#666';
                }
                const timerEl = msgEl.querySelector('.file-timer');
                if (timerEl) timerEl.textContent = '✓ 文件已保存';
            }

            // 清理内存
            delete window['receivedFile_' + fileId];
        }

        function showMessage(content, senderName, msgId, isSent) {
            const messageEl = document.createElement('div');

        function burnMessage(msgId) {
            const msgEl = document.querySelector('[data-id="' + msgId + '"]');
            if (msgEl) {
                msgEl.classList.add('burning');

        function sendMessage() {
            const content = document.getElementById('messageInput').value.trim();
            if (!content) return;

            const msgId = crypto.randomUUID();
            showMessage(content, userName, msgId, true);

            if (conn) {

                    id: msgId,

                });

        // ===== 语音消息 =====
        async function startVoiceRecord() {
            if (!conn || !conn.open) { toast('请先建立连接'); return; }
            try {
                voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
                voiceRecorder = new MediaRecorder(voiceStream, { mimeType: mime });
                voiceChunks = [];
                voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data); };
                voiceRecorder.start();
                isRecording = true;
                voiceStartTime = Date.now();
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('voiceBtn').textContent = '⬤';
            } catch(e) {
                toast('无法访问麦克风');
                isRecording = false;
            }
        }

        async function stopVoiceRecord() {
            if (!isRecording || !voiceRecorder) return;
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('voiceBtn').textContent = '🎤';
            const btn = document.getElementById('voiceBtn');
            return new Promise(resolve => {
                voiceRecorder.onstop = async () => {
                    if (voiceStream) { voiceStream.getTracks().forEach(t => t.stop()); voiceStream = null; }
                    const blob = new Blob(voiceChunks, { type: voiceRecorder.mimeType });
                    voiceRecorder = null; voiceChunks = [];
                    resolve(blob);
                };
                voiceRecorder.stop();
            });
        }

        function sendVoice(blob) {
            if (!blob || blob.size < 100) return;
            const reader = new FileReader();
            reader.onload = function() {
                const msgId = crypto.randomUUID();
                const duration = Math.max(1, Math.round((Date.now() - voiceStartTime) / 1000));
                const voiceData = {
                    type: 'voice', id: msgId, name: userName,
                    data: reader.result, duration: Math.min(duration, 60),
                    mime: blob.type, timestamp: Date.now()
                };
                showVoiceMessage(voiceData, msgId, true);
                conn.send(voiceData);
            };
            reader.readAsDataURL(blob);
        }

        function showVoiceMessage(data, msgId, isSent) {
            const el = document.createElement('div');
            el.className = 'message ' + (isSent ? 'sent' : 'received') + ' voice-message';
            el.dataset.id = msgId;
            el.innerHTML = `
                <div class="message-sender">${data.name}</div>
                <div class="voice-bubble">
                    <button class="voice-play" data-voice-id="${msgId}">▶</button>
                    <span class="voice-meta">🎤 ${data.duration || '?'}″</span>
                </div>
                <div class="message-time">${new Date(data.timestamp).toLocaleTimeString()}</div>
            `;
            document.getElementById('messages').appendChild(el);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            setupVoicePlay(el, data.data, data.mime);
            if (!isSent) playNotificationSound();
            setTimeout(() => burnMessage(msgId), burnTime * 1000);
        }

        function setupVoicePlay(el, dataUrl, mime) {
            const btn = el.querySelector('.voice-play');
            if (!btn) return;
            const audio = new Audio(dataUrl);
            btn.addEventListener('click', () => {
                if (btn.classList.contains('played')) return;
                btn.classList.add('played');
                btn.textContent = '⏸';
                audio.play().catch(() => {});
                audio.onended = () => { btn.textContent = '✓'; };
            });
        }

        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // ===== 连接超时计时器 =====
        let connectionStartTime = 0;
        let connectionTimer = null;

        function startConnectionTimer() {
            connectionStartTime = Date.now();
            if (connectionTimer) clearInterval(connectionTimer);
            connectionTimer = setInterval(() => {
                const elapsed = Math.round((Date.now() - connectionStartTime) / 1000);
                if (elapsed >= 60) {
                    updateStatus('disconnected', '连接超时，请返回重试');
                    clearInterval(connectionTimer);
                    connectionTimer = null;
                    if (peer && !peer.destroyed) { peer.destroy(); peer = null; }
                } else if (elapsed >= 20) {
                    updateStatus('waiting', '正在通过中继连接... 已等待 ' + elapsed + 's');
                }
            }, 3000);
        }

        function stopConnectionTimer() {
            if (connectionTimer) { clearInterval(connectionTimer); connectionTimer = null; }
        }

        // ===== 页面切后台处理（防止 iOS Safari 挂起 WebSocket 导致崩溃） =====
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                // 切后台前：无活跃连接时主动销毁 peer
                if (peer && !peer.destroyed && (!conn || !conn.open)) {
                    stopConnectionTimer();
                    peer.destroy();
                    peer = null;
                }
            } else if (document.visibilityState === 'visible') {
                // 回前台：peer 被销毁且还在等待连接，自动重建
                if (!peer && currentInviteCode) {
                    reconnectPeer();
                }
            }
        });

        function reconnectPeer() {
            if (isHost) {
                updateStatus('waiting', '重新等待连接...');
                peer = new Peer('burnafter-' + currentInviteCode, { debug: 0, config: ICE_CONFIG });
                peer.on('connection', function(c) {
                    conn = c;
                    isHost = true;
                    c.on('open', function() { setupConnection(); });
                });
                peer.on('error', function(err) {
                    toast('连接错误: ' + err.message);
                    updateStatus('disconnected', '连接失败');
                });
            } else {
                updateStatus('waiting', '重新连接中...');
                peer = new Peer({ debug: 0, config: ICE_CONFIG });
                peer.on('open', function(id) {
                    conn = peer.connect('burnafter-' + currentInviteCode);
                    conn.on('open', function() {
                        isHost = false;
                        setupConnection();
                    });
                    conn.on('error', function(err) {
                        toast('连接失败: ' + err.message);
                        updateStatus('disconnected', '连接失败');
                    });
                });
                peer.on('error', function(err) {
                    toast('Peer错误: ' + err.message);
                    updateStatus('disconnected', '连接失败');
                });
            }
            startConnectionTimer();
        }

        // ===== 窗口关闭前清理 =====
        window.addEventListener('beforeunload', () => {
            stopConnectionTimer();
            if (peer && !peer.destroyed) peer.destroy();
        });
    </script>
</body>
</html>
